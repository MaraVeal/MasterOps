<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mise Tab — Master Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- ════════ EMBEDDED DATA (auto-populated by Save File button — do not edit by hand) ════════ -->
  <script id="master-ops-data" type="application/json">{}</script>
  <script>
  // Apply saved theme before render to avoid flash of light.
  (function(){
    try {
      if (localStorage.getItem('mise_theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
    window.miseToggleTheme = function() {
      var html = document.documentElement;
      var isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        try { localStorage.setItem('mise_theme', 'light'); } catch (e) {}
      } else {
        html.setAttribute('data-theme', 'dark');
        try { localStorage.setItem('mise_theme', 'dark'); } catch (e) {}
      }
    };
  })();
  </script>
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       MISE TAB · Restaurant Contacts
       Standalone build. Class prefix: rc-
       All styles scoped under .mise-tab-root so they cannot collide with the
       host page on merge into Mise.
       ═══════════════════════════════════════════════════════════════════════ */

    /* ── Design tokens (mirrors Mise main) ── */
    :root {
      --bg-page:        #F5F5F6;
      --bg-card:        #fff;
      --bg-soft:        #FAFAFA;
      --text-default:   #222;
      --text-primary:   #374053;
      --text-secondary: #737A87;
      --text-muted:     #AFB3BA;
      --border:         #e4e6ea;
      --border-input:   #d7dae0;
      --divider:        #eef0f3;
      --color-orange:   #F3634A;
      --color-orange-dark: #d94f39;
      --color-green:    #18CC9B;
      --color-green-deep: #0E8F66;
      --color-green-soft: #E4F8F1;
      --color-green-border: #8FDCC0;
      --color-yellow:   #FBDB56;
      --color-charcoal: #374053;
      --color-red:      #C74425;
      --color-red-soft: #FEE8E2;
      --color-red-border: #F3A896;
    }
    html[data-theme="dark"] {
      --bg-page:        #2f3641;
      --bg-card:        #3d4452;
      --bg-soft:        #353c48;
      --text-default:   #D4D8DE;
      --text-primary:   #D4D8DE;
      --text-secondary: #B5BEC9;
      --text-muted:     #9AA6B5;
      --border:         rgba(255,255,255,0.1);
      --border-input:   rgba(255,255,255,0.14);
      --divider:        rgba(255,255,255,0.06);
      background-color: #2f3641 !important;
    }
    html[data-theme="dark"] body { background-color: #2f3641 !important; }

    /* ── Scoping reset (only inside .mise-tab-root) ── */
    .mise-tab-root, .mise-tab-root * { box-sizing: border-box; }
    .mise-tab-root {
      font-family: "Quicksand", "Segoe UI", Arial, sans-serif;
      color: var(--text-default);
      background: var(--bg-page);
      padding: 24px 32px;
      min-height: 100vh;
      line-height: 1.4;
      transition: background .2s, color .2s;
    }
    input, button, select, textarea { font-family: inherit; }

    /* ── Wordmark (Mise brand type) ── */
    .mise-tab-root .mise-word {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic; font-weight: 500; letter-spacing: .3px;
    }

    /* ══════════════════ Header ══════════════════ */
    .mise-tab-root .rc-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }
    .mise-tab-root .rc-title {
      font-size: 24px; font-weight: 700; color: var(--text-primary);
    }
    .mise-tab-root .rc-subtitle {
      font-size: 13px; color: var(--text-secondary); margin-top: 2px;
    }
    .mise-tab-root .rc-header-actions { display: flex; gap: 8px; align-items: center; }

    /* ══════════════════ Subnav (sites) ══════════════════ */
    .mise-tab-root .rc-subnav {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 4px; width: fit-content; max-width: 100%;
      flex-wrap: wrap;
    }
    .mise-tab-root .rc-subnav-btn {
      padding: 8px 14px; border: none; background: transparent;
      color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer;
      border-radius: 7px; font-family: inherit; transition: all .15s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .mise-tab-root .rc-subnav-btn:hover { color: var(--text-primary); background: var(--bg-soft); }
    .mise-tab-root .rc-subnav-btn.active {
      background: var(--color-orange); color: #fff;
    }
    .mise-tab-root .rc-subnav-btn .rc-count {
      font-size: 11px; font-weight: 700;
      padding: 1px 7px; border-radius: 999px;
      background: rgba(0,0,0,0.06); color: var(--text-secondary);
      min-width: 18px; text-align: center;
    }
    .mise-tab-root .rc-subnav-btn.active .rc-count {
      background: rgba(255,255,255,0.22); color: #fff;
    }
    html[data-theme="dark"] .mise-tab-root .rc-subnav-btn .rc-count {
      background: rgba(255,255,255,0.08);
    }
    .mise-tab-root .rc-subnav-sep {
      display: inline-block;
      width: 1px; height: 22px; align-self: center;
      background: var(--border); margin: 0 4px;
    }
    .mise-tab-root .rc-subnav-add {
      color: var(--color-orange); font-weight: 700;
    }
    .mise-tab-root .rc-subnav-add:hover { background: var(--bg-soft); color: var(--color-orange-dark); }
    .mise-tab-root .rc-subnav-hidden {
      color: var(--text-muted); font-weight: 600;
    }
    .mise-tab-root .rc-subnav-hidden:hover { color: var(--text-primary); background: var(--bg-soft); }

    /* Site dropdown (replaces horizontal pills when there are many sites) */
    .mise-tab-root .rc-site-dropdown {
      position: relative; display: inline-block;
    }
    .mise-tab-root .rc-site-dropdown-btn {
      padding: 8px 14px; background: var(--color-orange); color: #fff;
      border: none; border-radius: 7px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      display: inline-flex; align-items: center; gap: 10px;
      transition: background .15s;
    }
    .mise-tab-root .rc-site-dropdown-btn:hover { background: var(--color-orange-dark); }
    .mise-tab-root .rc-site-dropdown-btn .rc-chevron {
      display: inline-flex; align-items: center; transition: transform .15s;
    }
    .mise-tab-root .rc-site-dropdown.open .rc-site-dropdown-btn .rc-chevron {
      transform: rotate(180deg);
    }
    .mise-tab-root .rc-site-dropdown-btn .rc-count {
      font-size: 11px; font-weight: 700;
      padding: 1px 7px; border-radius: 999px;
      background: rgba(255,255,255,0.22); color: #fff;
      min-width: 18px; text-align: center;
    }
    .mise-tab-root .rc-site-dropdown-menu {
      position: absolute; top: calc(100% + 6px); left: 0;
      min-width: 260px; max-height: 360px; overflow-y: auto;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      z-index: 100; padding: 4px;
      display: none;
    }
    html[data-theme="dark"] .mise-tab-root .rc-site-dropdown-menu {
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .mise-tab-root .rc-site-dropdown.open .rc-site-dropdown-menu { display: block; }
    .mise-tab-root .rc-site-dropdown-empty {
      padding: 12px 14px; color: var(--text-muted);
      font-size: 12px; text-align: center;
    }
    .mise-tab-root .rc-site-dropdown-item {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 8px 12px; border-radius: 6px; cursor: pointer;
      background: transparent; border: none; color: var(--text-primary);
      font-size: 13px; font-weight: 500; font-family: inherit;
      text-align: left; transition: background .1s;
    }
    .mise-tab-root .rc-site-dropdown-item:hover { background: var(--bg-soft); }
    .mise-tab-root .rc-site-dropdown-item.active {
      background: rgba(243,99,74,0.10); color: var(--color-orange); font-weight: 700;
    }
    .mise-tab-root .rc-site-dropdown-item .rc-count {
      font-size: 11px; font-weight: 700;
      padding: 1px 7px; border-radius: 999px;
      background: rgba(0,0,0,0.06); color: var(--text-secondary);
      min-width: 18px; text-align: center;
    }
    .mise-tab-root .rc-site-dropdown-item.active .rc-count {
      background: rgba(243,99,74,0.18); color: var(--color-orange);
    }
    html[data-theme="dark"] .mise-tab-root .rc-site-dropdown-item .rc-count {
      background: rgba(255,255,255,0.08);
    }

    /* Collapsible block-head (used for Site Info) */
    .mise-tab-root .rc-collapsible-trigger {
      cursor: pointer; user-select: none;
      display: inline-flex; align-items: center; gap: 10px;
      padding: 4px 6px; margin: -4px -6px; border-radius: 6px;
      transition: background .12s;
    }
    .mise-tab-root .rc-collapsible-trigger:hover { background: rgba(255,255,255,0.08); }
    .mise-tab-root .rc-collapsible-trigger .rc-chevron {
      display: inline-flex; align-items: center;
      transition: transform .15s; opacity: 0.7;
    }
    .mise-tab-root .rc-collapsible-trigger.expanded .rc-chevron { transform: rotate(180deg); }

    /* ══════════════════ Search + selection bar ══════════════════ */
    .mise-tab-root .rc-toolbar {
      display: flex; gap: 12px; align-items: center; margin-bottom: 12px;
    }
    .mise-tab-root .rc-search {
      flex: 1; position: relative;
    }
    .mise-tab-root .rc-search input {
      width: 100%; padding: 9px 12px 9px 36px;
      border: 1px solid var(--border-input); border-radius: 8px;
      font-size: 13px; font-family: inherit; color: var(--text-primary);
      background: var(--bg-card);
      transition: border-color .15s, box-shadow .15s;
    }
    .mise-tab-root .rc-search input:focus {
      outline: none; border-color: var(--color-orange);
      box-shadow: 0 0 0 3px rgba(243,99,74,0.12);
    }
    .mise-tab-root .rc-search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); display: flex; align-items: center;
    }

    /* Global search bar (at top of page, above Site Info) */
    .mise-tab-root .rc-global-search {
      position: relative; margin-bottom: 14px;
    }
    .mise-tab-root .rc-global-search input {
      width: 100%; padding: 11px 40px 11px 40px;
      border: 1px solid var(--border-input); border-radius: 10px;
      font-size: 14px; font-family: inherit; color: var(--text-primary);
      background: var(--bg-card);
      transition: border-color .15s, box-shadow .15s;
      box-shadow: 0 1px 3px rgba(24, 28, 35, 0.04);
    }
    .mise-tab-root .rc-global-search input:focus {
      outline: none; border-color: var(--color-orange);
      box-shadow: 0 0 0 3px rgba(243,99,74,0.12);
    }
    .mise-tab-root .rc-global-search .rc-search-icon { left: 14px; }
    .mise-tab-root .rc-search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 24px; height: 24px; border-radius: 50%; border: none;
      background: var(--bg-soft); color: var(--text-secondary);
      font-size: 16px; line-height: 1; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; padding: 0;
    }
    .mise-tab-root .rc-search-clear:hover {
      background: var(--color-red); color: #fff;
    }

    /* Search results dropdown (typeahead under the global search bar) */
    .mise-tab-root .rc-search-results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      z-index: 50; max-height: 480px; overflow-y: auto;
      padding: 4px;
    }
    html[data-theme="dark"] .mise-tab-root .rc-search-results {
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .mise-tab-root .rc-search-section {
      padding: 6px 0; border-bottom: 1px solid var(--divider);
    }
    .mise-tab-root .rc-search-section:last-child { border-bottom: none; }
    .mise-tab-root .rc-search-section-title {
      padding: 6px 12px 4px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-muted);
    }
    .mise-tab-root .rc-search-result {
      display: block; width: 100%; background: transparent; border: none;
      text-align: left; padding: 8px 12px; border-radius: 6px;
      cursor: pointer; font-family: inherit; color: var(--text-primary);
      transition: background .1s;
    }
    .mise-tab-root .rc-search-result:hover { background: var(--bg-soft); }
    .mise-tab-root .rc-search-result-main {
      font-size: 13px; font-weight: 600;
    }
    .mise-tab-root .rc-search-result-meta {
      font-size: 11px; color: var(--text-secondary); margin-top: 2px;
    }
    .mise-tab-root .rc-search-empty {
      padding: 16px 12px; font-size: 13px;
      color: var(--text-muted); text-align: center;
    }

    /* ══════════════════ Block card ══════════════════ */
    .mise-tab-root .rc-block {
      background: var(--bg-card); border-radius: 12px;
      box-shadow: 0 1px 3px rgba(24, 28, 35, 0.04);
      border: 1px solid var(--border);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .mise-tab-root .rc-block-head {
      background: var(--color-charcoal); color: #fff;
      padding: 12px 18px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px;
    }
    .mise-tab-root .rc-block-head h2 {
      font-size: 14px; font-weight: 600; margin: 0;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .mise-tab-root .rc-block-body { padding: 0; }
    .mise-tab-root .rc-block-body.rc-padded { padding: 18px; }

    /* Soft tag (count badge) on the block header */
    .mise-tab-root .rc-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 999px;
      background: rgba(255,255,255,0.12); color: #fff;
      letter-spacing: .3px;
    }

    /* CTA button on a dark block header */
    .mise-tab-root .rc-block-head .rc-btn-head {
      background: var(--color-orange); color: #fff;
      border: 1px solid var(--color-orange);
      padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      transition: background .15s, border-color .15s;
    }
    .mise-tab-root .rc-block-head .rc-btn-head:hover {
      background: var(--color-orange-dark); border-color: var(--color-orange-dark);
    }

    /* ══════════════════ Buttons ══════════════════ */
    .mise-tab-root .rc-btn {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .15s;
      border: 1px solid transparent; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .mise-tab-root .rc-btn-primary {
      background: var(--color-orange); color: #fff; border-color: var(--color-orange);
    }
    .mise-tab-root .rc-btn-primary:hover { background: var(--color-orange-dark); border-color: var(--color-orange-dark); }
    .mise-tab-root .rc-btn-ghost {
      background: var(--bg-card); color: var(--text-primary); border-color: var(--border-input);
    }
    .mise-tab-root .rc-btn-ghost:hover { border-color: var(--color-orange); color: var(--color-orange); }
    .mise-tab-root .rc-btn-sm { padding: 6px 10px; font-size: 12px; }

    /* ══════════════════ Form inputs ══════════════════ */
    .mise-tab-root .rc-input {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border-input);
      border-radius: 8px; font-size: 13px; font-family: inherit; color: var(--text-primary);
      background: var(--bg-card); transition: border-color .15s, box-shadow .15s;
    }
    .mise-tab-root .rc-input:focus {
      outline: none; border-color: var(--color-orange);
      box-shadow: 0 0 0 3px rgba(243,99,74,0.12);
    }
    .mise-tab-root .rc-input::placeholder { color: var(--text-muted); }
    .mise-tab-root .rc-label {
      display: block; font-size: 11px; font-weight: 700;
      letter-spacing: .3px; text-transform: uppercase; color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .mise-tab-root .rc-label .rc-required { color: var(--color-orange); margin-left: 2px; }
    .mise-tab-root .rc-hint {
      font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.4;
    }
    .mise-tab-root textarea.rc-input { resize: vertical; min-height: 60px; }

    /* ── Shift schedule editor (in site form) ── */
    .mise-tab-root .rc-shifts {
      display: flex; flex-direction: column; gap: 10px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-soft); padding: 10px;
    }
    .mise-tab-root .rc-shift-row {
      display: grid;
      grid-template-columns: 110px 1fr 200px;
      gap: 10px; align-items: center;
      min-width: 0;
    }
    .mise-tab-root .rc-shift-row > * { min-width: 0; }
    @media (max-width: 600px) {
      .mise-tab-root .rc-shift-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
    .mise-tab-root .rc-shift-name {
      font-size: 13px; font-weight: 700; color: var(--text-primary);
    }
    .mise-tab-root .rc-shift-times {
      display: flex; align-items: center; gap: 6px;
    }
    .mise-tab-root .rc-time-input {
      flex: 1; min-width: 0; padding: 6px 8px; font-size: 12px;
    }
    .mise-tab-root .rc-shift-dash {
      color: var(--text-muted); font-weight: 600;
    }
    .mise-tab-root .rc-shift-days {
      display: flex; gap: 3px;
    }
    .mise-tab-root .rc-day-select {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      padding: 6px 8px;
      font-size: 12px;
    }
    @media (max-width: 600px) {
      .mise-tab-root .rc-day-select { width: 100%; }
    }

    /* Custom day buttons — shown inline below the dropdown when "Custom days…" is selected */
    .mise-tab-root .rc-shift-custom-days {
      grid-column: 1 / -1;
      display: flex; gap: 4px; flex-wrap: wrap;
      padding: 4px 0 2px;
    }
    .mise-tab-root .rc-day-btn {
      width: 30px; height: 28px; padding: 0;
      border: 1px solid var(--border-input);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 11px; font-weight: 700;
      border-radius: 6px; cursor: pointer;
      font-family: inherit;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .mise-tab-root .rc-day-btn:hover {
      border-color: var(--color-orange); color: var(--color-orange);
    }
    .mise-tab-root .rc-day-btn.active {
      background: var(--color-orange); border-color: var(--color-orange); color: #fff;
    }
    .mise-tab-root .rc-day-btn.active:hover {
      background: var(--color-orange-dark); border-color: var(--color-orange-dark);
    }

    /* ── Site Info block (top of site page) ── */
    .mise-tab-root .rc-site-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 760px) {
      .mise-tab-root .rc-site-info { grid-template-columns: 1fr; }
    }
    .mise-tab-root .rc-info-section { display: flex; flex-direction: column; gap: 16px; }
    .mise-tab-root .rc-info-row { display: flex; flex-direction: column; gap: 5px; }
    .mise-tab-root .rc-info-label {
      font-size: 12px; font-weight: 700; letter-spacing: .6px;
      text-transform: uppercase; color: var(--text-primary);
    }
    .mise-tab-root .rc-info-value {
      font-size: 14px; color: var(--text-primary); line-height: 1.5;
    }
    .mise-tab-root .rc-info-value-multiline { white-space: pre-line; }
    .mise-tab-root .rc-info-stack {
      display: flex; flex-direction: column; gap: 1px;
    }
    .mise-tab-root .rc-info-link {
      color: var(--color-orange); text-decoration: none; font-weight: 600;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .mise-tab-root .rc-info-link:hover { text-decoration: underline; color: var(--color-orange-dark); }
    .mise-tab-root .rc-schedule {
      display: flex; flex-direction: column; gap: 6px;
      margin-top: 4px;
    }
    .mise-tab-root .rc-schedule-row {
      display: grid; grid-template-columns: 110px 1fr 1fr;
      gap: 12px; align-items: baseline;
      font-size: 13px;
      padding: 6px 10px; border-radius: 6px;
      background: var(--bg-soft);
    }
    .mise-tab-root .rc-schedule-name {
      font-weight: 700; color: var(--text-primary);
    }
    .mise-tab-root .rc-schedule-time { color: var(--text-primary); }
    .mise-tab-root .rc-schedule-days { color: var(--text-secondary); font-size: 12px; }
    .mise-tab-root .rc-schedule-empty {
      font-size: 12px; color: var(--text-muted); font-style: italic;
    }
    .mise-tab-root .rc-phone-list { display: flex; flex-direction: column; gap: 6px; }
    .mise-tab-root .rc-phone-row { display: flex; gap: 6px; align-items: stretch; }
    .mise-tab-root .rc-phone-input { flex: 1; }
    .mise-tab-root .rc-phone-remove {
      width: 34px; padding: 0;
      background: var(--bg-soft); border: 1px solid var(--border-input);
      border-radius: 8px; cursor: pointer; color: var(--text-secondary);
      font-size: 16px; font-weight: 600; line-height: 1;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .mise-tab-root .rc-phone-remove:hover {
      background: #FFF4F0; color: var(--color-red); border-color: var(--color-red-border);
    }
    html[data-theme="dark"] .mise-tab-root .rc-phone-remove:hover {
      background: rgba(199,68,37,0.15);
    }
    .mise-tab-root .rc-phone-add {
      background: transparent; border: none; padding: 6px 0 0; cursor: pointer;
      color: var(--color-orange); font-size: 12px; font-weight: 700;
      font-family: inherit; display: inline-flex; align-items: center; gap: 3px;
    }
    .mise-tab-root .rc-phone-add:hover { color: var(--color-orange-dark); text-decoration: underline; }

    /* ══════════════════ Form layout ══════════════════ */
    .mise-tab-root .rc-form { padding: 18px; }
    .mise-tab-root .rc-field { margin-bottom: 12px; }
    .mise-tab-root .rc-field:last-child { margin-bottom: 0; }
    .mise-tab-root .rc-form-actions {
      display: flex; gap: 8px; justify-content: flex-end;
      padding-top: 12px; border-top: 1px solid var(--divider); margin-top: 4px;
    }
    .mise-tab-root .rc-form-error {
      padding: 10px 12px; background: #FFF4F0; color: var(--color-red);
      border: 1px solid var(--color-red-border); border-radius: 8px;
      font-size: 12px; font-weight: 600; margin-bottom: 12px;
    }
    html[data-theme="dark"] .mise-tab-root .rc-form-error {
      background: rgba(199,68,37,0.15); border-color: rgba(243,168,150,0.3);
    }
    .mise-tab-root .rc-checkbox-row {
      display: flex; align-items: center; gap: 8px; font-size: 13px;
      color: var(--text-primary); cursor: pointer;
    }
    .mise-tab-root .rc-checkbox-row input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--color-orange); cursor: pointer;
    }

    /* Status segmented toggle in form */
    .mise-tab-root .rc-seg {
      display: flex; gap: 4px; background: var(--bg-soft); padding: 3px;
      border-radius: 8px; border: 1px solid var(--border);
    }
    .mise-tab-root .rc-seg-btn {
      flex: 1; padding: 6px 8px; border: none; background: transparent;
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      cursor: pointer; border-radius: 6px; font-family: inherit;
      transition: all .12s;
    }
    .mise-tab-root .rc-seg-btn:hover { color: var(--text-primary); }
    .mise-tab-root .rc-seg-btn.active {
      background: var(--bg-card); color: var(--text-primary);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .mise-tab-root .rc-seg-btn[data-val="active"].active   { color: var(--color-green-deep); }
    .mise-tab-root .rc-seg-btn[data-val="paused"].active   { color: #A16207; }
    .mise-tab-root .rc-seg-btn[data-val="terminated"].active { color: var(--color-red); }
    .mise-tab-root .rc-seg-btn[data-val="high"].active     { color: var(--color-green-deep); }
    .mise-tab-root .rc-seg-btn[data-val="average"].active  { color: #A16207; }
    .mise-tab-root .rc-seg-btn[data-val="low"].active      { color: var(--color-red); }

    /* ══════════════════ Status pills (table rows) ══════════════════ */
    .mise-tab-root .rc-status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 700; letter-spacing: .3px;
      padding: 3px 9px; border-radius: 999px; border: 1px solid;
      white-space: nowrap;
    }
    .mise-tab-root .rc-status-pill.active {
      background: var(--color-green-soft); color: var(--color-green-deep); border-color: var(--color-green-border);
    }
    .mise-tab-root .rc-status-pill.paused {
      background: #FFF8DC; color: #856404; border-color: #FBDB56;
    }
    .mise-tab-root .rc-status-pill.terminated {
      background: var(--color-red-soft); color: var(--color-red); border-color: var(--color-red-border);
    }
    .mise-tab-root .rc-status-pill .rc-dot {
      width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    }
    html[data-theme="dark"] .mise-tab-root .rc-status-pill.active {
      background: rgba(24,204,155,0.15); border-color: rgba(143,220,192,0.4);
    }
    html[data-theme="dark"] .mise-tab-root .rc-status-pill.paused {
      background: rgba(251,219,86,0.15); color: #FBDB56; border-color: rgba(251,219,86,0.4);
    }
    html[data-theme="dark"] .mise-tab-root .rc-status-pill.terminated {
      background: rgba(199,68,37,0.15); border-color: rgba(243,168,150,0.4);
    }

    /* Performance text in its own column */
    .mise-tab-root .rc-perf {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 700;
      line-height: 1.2;
    }
    .mise-tab-root .rc-perf svg { flex-shrink: 0; }
    .mise-tab-root .rc-perf.high    { color: var(--color-green-deep); }
    .mise-tab-root .rc-perf.average { color: #A16207; }
    .mise-tab-root .rc-perf.low     { color: var(--color-red); }
    .mise-tab-root .rc-perf.rc-perf-empty { color: var(--text-muted); font-weight: 400; }
    html[data-theme="dark"] .mise-tab-root .rc-perf.high    { color: var(--color-green); }
    html[data-theme="dark"] .mise-tab-root .rc-perf.average { color: var(--color-yellow); }
    html[data-theme="dark"] .mise-tab-root .rc-perf.low     { color: #F3A896; }

    /* NEW badge */
    .mise-tab-root .rc-new-badge {
      display: inline-block; font-size: 9px; font-weight: 800; letter-spacing: 0.5px;
      padding: 2px 6px; border-radius: 4px; margin-left: 8px;
      background: var(--color-orange); color: #fff; vertical-align: 2px;
    }

    /* ══════════════════ Data table ══════════════════ */
    .mise-tab-root .rc-table-wrap { overflow-x: auto; }
    .mise-tab-root .rc-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .mise-tab-root .rc-table thead th {
      background: var(--bg-soft); color: var(--text-secondary);
      font-size: 10px; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; text-align: left;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .mise-tab-root .rc-table tbody td {
      padding: 12px 14px; border-bottom: 1px solid var(--divider);
      vertical-align: top;
    }
    .mise-tab-root .rc-table tbody tr:last-child td { border-bottom: none; }
    .mise-tab-root .rc-table tbody tr:hover { background: var(--bg-soft); }
    .mise-tab-root .rc-table tbody tr.is-selected { background: rgba(243,99,74,0.06); }
    .mise-tab-root .rc-check-cell { width: 36px; padding-right: 0 !important; }
    .mise-tab-root .rc-check-cell input[type="checkbox"] {
      width: 15px; height: 15px; accent-color: var(--color-orange); cursor: pointer;
    }

    /* Drag handle column for reordering */
    .mise-tab-root .rc-drag-cell {
      width: 24px; padding-left: 6px !important; padding-right: 0 !important;
      text-align: center; color: var(--text-muted);
      cursor: grab;
    }
    .mise-tab-root .rc-drag-cell:active { cursor: grabbing; }
    .mise-tab-root .rc-drag-handle {
      display: inline-flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
    }
    .mise-tab-root .rc-table tbody tr:hover .rc-drag-handle { opacity: 0.55; }
    .mise-tab-root .rc-table tbody tr .rc-drag-handle:hover { opacity: 1; color: var(--text-primary); }
    .mise-tab-root .rc-contact-row.rc-dragging { opacity: 0.4; }
    .mise-tab-root .rc-contact-row.rc-drop-top td { box-shadow: inset 0 3px 0 0 var(--color-orange); }
    .mise-tab-root .rc-contact-row.rc-drop-bottom td { box-shadow: inset 0 -3px 0 0 var(--color-orange); }
    .mise-tab-root .rc-restaurant-name {
      font-weight: 600; color: var(--text-primary);
    }
    .mise-tab-root .rc-restaurant-link {
      font-weight: 600; color: var(--text-primary); text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .mise-tab-root .rc-restaurant-link:hover {
      color: var(--color-orange); text-decoration: underline;
    }
    .mise-tab-root .rc-link-icon { opacity: 0.45; display: inline-flex; transition: opacity .15s; }
    .mise-tab-root .rc-restaurant-link:hover .rc-link-icon { opacity: 1; }
    .mise-tab-root .rc-contact-line {
      font-size: 12px; color: var(--text-secondary); margin-top: 3px;
    }
    .mise-tab-root .rc-cuisine-tag {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 999px;
      background: var(--bg-soft); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .mise-tab-root .rc-market-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
      background: rgba(243,99,74,0.12); color: var(--color-orange);
      border: 1px solid rgba(243,99,74,0.25);
      letter-spacing: .3px; text-transform: uppercase;
    }
    .mise-tab-root .rc-req-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 12px; background: var(--bg-soft);
      border: 1px solid var(--border); border-radius: 6px;
    }
    .mise-tab-root .rc-req-row .rc-row-btn { opacity: 1; }
    .mise-tab-root .rc-status-date {
      font-size: 11px; color: var(--text-secondary); margin-top: 5px;
    }
    .mise-tab-root .rc-status-reason {
      font-size: 11px; color: var(--text-secondary); margin-top: 3px;
      font-style: italic; max-width: 240px; line-height: 1.35;
    }

    /* Row action buttons */
    .mise-tab-root .rc-row-actions {
      display: inline-flex; gap: 4px; opacity: 0; transition: opacity .15s;
    }
    .mise-tab-root .rc-table tbody tr:hover .rc-row-actions { opacity: 1; }
    .mise-tab-root .rc-table tbody tr .rc-row-actions.is-editing { opacity: 1; }
    .mise-tab-root .rc-row-btn {
      width: 28px; height: 28px; padding: 0; border-radius: 6px;
      background: transparent; border: 1px solid transparent;
      color: var(--text-secondary); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .mise-tab-root .rc-row-btn:hover {
      background: var(--bg-card); border-color: var(--border);
      color: var(--text-primary);
    }
    .mise-tab-root .rc-row-btn.is-editing {
      background: var(--color-orange); color: #fff; border-color: var(--color-orange);
    }
    .mise-tab-root .rc-row-btn.danger:hover {
      background: #FFF4F0; color: var(--color-red); border-color: var(--color-red-border);
    }

    /* Empty state */
    .mise-tab-root .rc-empty {
      padding: 40px 18px; text-align: center; color: var(--text-muted);
      font-size: 13px;
    }
    .mise-tab-root .rc-empty-strong { color: var(--text-secondary); font-weight: 600; }

    /* ══════════════════ Selection bar ══════════════════ */
    .mise-tab-root .rc-selection-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; background: rgba(243,99,74,0.08);
      border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--text-primary);
    }
    html[data-theme="dark"] .mise-tab-root .rc-selection-bar {
      background: rgba(243,99,74,0.18);
    }
    .mise-tab-root .rc-selection-bar strong { color: var(--color-orange); }
    .mise-tab-root .rc-selection-actions { display: flex; gap: 8px; }

    /* ══════════════════ Modal ══════════════════ */
    .mise-tab-root .rc-modal {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(24,28,35,0.5);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .mise-tab-root .rc-modal.open { display: flex; }
    .mise-tab-root .rc-modal-card {
      background: var(--bg-card); border-radius: 12px;
      padding: 24px; width: 560px; max-width: 100%;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 48px rgba(24,28,35,0.2);
    }
    .mise-tab-root .rc-modal-title {
      font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;
    }
    .mise-tab-root .rc-modal-sub {
      font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5;
    }
    .mise-tab-root .rc-modal-sub code {
      background: var(--bg-soft); padding: 1px 5px; border-radius: 3px;
      font-size: 11px; color: var(--text-primary);
    }
    .mise-tab-root .rc-modal-actions {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;
      flex-wrap: wrap;
    }
    .mise-tab-root .rc-modal-actions-left {
      margin-right: auto; display: flex; gap: 8px;
    }

    /* Bulk add file dropzone */
    .mise-tab-root .rc-bulk-drop {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 28px 20px; margin-top: 4px;
      border: 2px dashed var(--border-input); border-radius: 10px;
      background: var(--bg-soft); cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .mise-tab-root .rc-bulk-drop:hover,
    .mise-tab-root .rc-bulk-drop.rc-drop-hover {
      border-color: var(--color-orange);
      background: rgba(243, 99, 74, 0.04);
    }
    html[data-theme="dark"] .mise-tab-root .rc-bulk-drop:hover,
    html[data-theme="dark"] .mise-tab-root .rc-bulk-drop.rc-drop-hover {
      background: rgba(243, 99, 74, 0.10);
    }
    .mise-tab-root .rc-bulk-drop-icon { font-size: 32px; line-height: 1; margin-bottom: 4px; }
    .mise-tab-root .rc-bulk-drop-primary { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .mise-tab-root .rc-bulk-drop-secondary { font-size: 12px; color: var(--text-secondary); }

    /* Bulk add preview */
    .mise-tab-root .rc-preview {
      max-height: 200px; overflow-y: auto; border: 1px solid var(--border);
      border-radius: 8px; margin-top: 12px; font-size: 12px;
    }
    .mise-tab-root .rc-preview-row {
      padding: 6px 10px; border-bottom: 1px solid var(--divider);
      display: flex; justify-content: space-between; gap: 10px;
    }
    .mise-tab-root .rc-preview-row:last-child { border-bottom: none; }
    .mise-tab-root .rc-preview-name { font-weight: 600; color: var(--text-primary); }
    .mise-tab-root .rc-preview-meta { color: var(--text-secondary); font-size: 11px; }
    .mise-tab-root .rc-preview-site {
      display: inline-block; margin-left: 6px;
      font-size: 10px; font-weight: 700; letter-spacing: .3px;
      padding: 1px 7px; border-radius: 4px;
      background: rgba(243,99,74,0.12); color: var(--color-orange);
      text-transform: uppercase; vertical-align: middle;
    }

    /* ══════════════════ Theme toggle ══════════════════ */
    .rc-theme-btn {
      background: transparent; border: none; padding: 6px 8px; cursor: pointer;
      color: var(--text-secondary); border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s; font-size: 18px; line-height: 1;
    }
    .rc-theme-btn:hover { color: var(--text-primary); background: var(--bg-soft); }
    .rc-theme-btn .rc-icon-moon { display: inline; }
    .rc-theme-btn .rc-icon-sun  { display: none; }
    html[data-theme="dark"] .rc-theme-btn .rc-icon-moon { display: none; }
    html[data-theme="dark"] .rc-theme-btn .rc-icon-sun  { display: inline; }

    /* ══════════════════ Help/feedback floating button ══════════════════ */
    .mise-tab-root .rc-help-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: transparent; border: none; padding: 4px; cursor: pointer;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
      opacity: 0.75; transition: opacity .15s;
      z-index: 9000;
    }
    .mise-tab-root .rc-help-btn:hover { opacity: 1; }
    .mise-tab-root .rc-help-mark { font-size: 28px; line-height: 1; }

    /* ══════════════════ Layout helpers ══════════════════ */
    .mise-tab-root .rc-row { display: flex; gap: 12px; align-items: center; }
    .mise-tab-root .rc-stack { display: flex; flex-direction: column; gap: 12px; }
    .mise-tab-root .rc-hidden { display: none !important; }

    /* ── Dark mode component overrides ── */
    html[data-theme="dark"] .mise-tab-root .rc-block { box-shadow: 0 1px 6px rgba(0,0,0,0.25); }
    html[data-theme="dark"] .mise-tab-root .rc-block-head { background: #2a3140; }
    html[data-theme="dark"] .mise-tab-root .rc-input { color: var(--text-primary); }
    html[data-theme="dark"] .mise-tab-root .rc-input:focus { box-shadow: 0 0 0 3px rgba(243,99,74,0.18); }
    html[data-theme="dark"] .mise-tab-root .rc-modal { background: rgba(10,12,18,0.65); }
    html[data-theme="dark"] .mise-tab-root .rc-modal-card { box-shadow: 0 24px 48px rgba(0,0,0,0.45); }
    html[data-theme="dark"] .mise-tab-root .rc-subnav { background: var(--bg-soft); border-color: var(--border); }
    html[data-theme="dark"] .mise-tab-root .rc-btn-ghost { background: var(--bg-soft); border-color: var(--border-input); }
    html[data-theme="dark"] .mise-tab-root .rc-table thead th { background: var(--bg-soft); }
    html[data-theme="dark"] .mise-tab-root .rc-table tbody tr:hover { background: rgba(255,255,255,0.04); }
    html[data-theme="dark"] .mise-tab-root .rc-table tbody tr.is-selected { background: rgba(243,99,74,0.15); }
    html[data-theme="dark"] .mise-tab-root .rc-cuisine-tag { background: var(--bg-soft); }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════════════════════════════════════
       ROOT WRAPPER — everything lives inside .mise-tab-root
       ════════════════════════════════════════════════════════════════════════ -->
  <div class="mise-tab-root">

    <header class="rc-header">
      <div>
        <div class="rc-title">Master Ops</div>
        <div class="rc-subtitle">Vendor partnerships and contact details for the team.</div>
      </div>
      <div class="rc-header-actions">
        <button class="rc-btn rc-btn-ghost mise-team-plus" onclick="rcOpenBulkEmail()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Bulk Email
        </button>
        <button class="rc-btn rc-btn-ghost mise-team-plus" onclick="rcOpenBulkAdd()">Bulk Add</button>
        <button class="rc-btn rc-btn-primary mise-team-plus" id="rc-new-request-btn" onclick="rcOpenRequests()" title="Create a new manual scheduling request">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Scheduling Request<span id="rc-new-request-count" style="display:none; margin-left:6px; background:rgba(255,255,255,0.25); padding:1px 7px; border-radius:999px; font-size:11px; font-weight:700;"></span>
        </button>
        <button class="rc-theme-btn" onclick="miseToggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span class="rc-icon-moon">🌙</span>
          <span class="rc-icon-sun">☀️</span>
        </button>
      </div>
    </header>

    <!-- Sites subnav -->
    <nav class="rc-subnav" id="rc-sites-nav" aria-label="Sites"></nav>

    <!-- Main content (full width — form opens as a modal) -->
    <div id="rc-content"></div>

    <!-- Modal mount (a single .rc-modal is rendered when needed) -->
    <div id="rc-modal-mount"></div>

    <!-- Help/feedback floating button -->
    <button class="rc-help-btn" title="Help & feedback" aria-label="Help and feedback" onclick="rcShowHelp()">
      <span class="rc-help-mark">💬</span>
    </button>

  </div>

  <script>
  /* ═══════════════════════════════════════════════════════════════════════
     MISE TAB · Restaurant Contacts — JS
     Standalone build. All logic scoped via closures; storage uses
     window.storage if available (Anthropic artifact context), else
     localStorage fallback.
     ═══════════════════════════════════════════════════════════════════════ */

  (function() {

  /* ══════════════════ Storage layer ══════════════════ */
  const useArtifactStorage = !!(window.storage && typeof window.storage.get === 'function');
  const STORAGE_PREFIX = 'rc_';
  async function sget(key) {
    if (useArtifactStorage) {
      try { const r = await window.storage.get(key); return r ? r.value : null; }
      catch(e) { return null; }
    }

  const PWHASH_KEY = 'mo_delete_pwhash';
  async function hashPassword(password) {
    const enc = new TextEncoder();
    const buf = await crypto.subtle.digest('SHA-256', enc.encode(password));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  function getPasswordHash() {
    try { return localStorage.getItem(PWHASH_KEY) || ''; } catch (e) { return ''; }
  }
  function setPasswordHashLocal(hash) {
    try { localStorage.setItem(PWHASH_KEY, hash); return true; } catch (e) { return false; }
  }
  function clearPasswordHashLocal() {

  }
  function isDeleteLockEnabled() { return !!getPasswordHash(); }
  async function verifyPassword(password) {
    const stored = getPasswordHash();
    if (!stored) return true;
    return (await hashPassword(password)) === stored;
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function todayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatStatusDate(iso) {
    if (!iso) return '';
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
    if (!m) return iso;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const d = new Date(+m[1], +m[2]-1, +m[3]);
    return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  }
  function parseDateInput(s) {
    if (!s) return '';
    s = String(s).trim();
    if (!s) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const d = new Date(s);
    if (isNaN(d.getTime())) return null;
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatPhone(value) {
    if (!value) return '';
    const digits = String(value).replace(/\D/g, '');
    if (digits.length === 0) return '';
    if (digits.length === 11 && digits[0] === '1') {
      return `1-${digits.slice(1, 4)}-${digits.slice(4, 7)}-${digits.slice(7)}`;
    }
    if (digits.length <= 3) return digits;
    if (digits.length <= 6) return `${digits.slice(0, 3)}-${digits.slice(3)}`;
    return `${digits.slice(0, 3)}-${digits.slice(3, 6)}-${digits.slice(6, 10)}`;
  }

  // Read data embedded in the HTML's <script id="master-ops-data"> tag, if present
  function loadEmbeddedData() {
    const el = document.getElementById('master-ops-data');
    if (!el) return null;
    try {
      const text = (el.textContent || '').trim();
      if (!text || text === '{}') return null;
      const data = JSON.parse(text);
      if (!data || typeof data !== 'object') return null;
      if (!Array.isArray(data.sites) && !Array.isArray(data.contacts)) return null;
      return data;
    } catch (e) {
      console.warn('[Master Ops] Could not parse embedded data:', e);
      return null;
    }
  }

  // Replace the in-memory storage with the embedded snapshot, then mirror it into localStorage
  async function applyEmbeddedSnapshot(data) {
    const sites = Array.isArray(data.sites) ? data.sites : [];
    const contacts = Array.isArray(data.contacts) ? data.contacts : [];
    const requests = Array.isArray(data.requests) ? data.requests : [];
    // Clear existing local entries first so removed records don't ghost back
    const oldSiteKeys = await slist('site:');
    const oldContactKeys = await slist('contact:');
    const oldRequestKeys = await slist('request:');
    for (const k of oldSiteKeys) await sdel(k);
    for (const k of oldContactKeys) await sdel(k);
    for (const k of oldRequestKeys) await sdel(k);
    for (const s of sites) await sset('site:' + s.id, JSON.stringify(s));
    for (const c of contacts) await sset('contact:' + c.id, JSON.stringify(c));
    for (const r of requests) await sset('request:' + r.id, JSON.stringify(r));
    return { sites, contacts, requests };
  }

  // Save current state into a new HTML file with embedded data, and trigger a download
  async function saveToFile() {
    try {
      const data = {
        version: 1,
        savedAt: new Date().toISOString(),
        sites: state.sites,
        contacts: state.contacts,
        requests: state.requests,
        deletePasswordHash: getPasswordHash() || '',
      };

      // Make sure the data script tag exists and update it
      let dataEl = document.getElementById('master-ops-data');
      if (!dataEl) {
        dataEl = document.createElement('script');
        dataEl.id = 'master-ops-data';
        dataEl.type = 'application/json';
        document.head.appendChild(dataEl);
      }
      dataEl.textContent = JSON.stringify(data, null, 2);

      // Snapshot dynamic mount points so the saved HTML doesn't carry over open modal/UI state
      const content = document.getElementById('rc-content');
      const modalMount = document.getElementById('rc-modal-mount');
      const subnav = document.getElementById('rc-sites-nav');
      const snap = {
        content: content ? content.innerHTML : '',
        modal:   modalMount ? modalMount.innerHTML : '',
        subnav:  subnav ? subnav.innerHTML : '',
      };
      if (content) content.innerHTML = '';
      if (modalMount) modalMount.innerHTML = '';
      if (subnav) subnav.innerHTML = '';

      const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

      // Restore the dynamic UI
      if (content) content.innerHTML = snap.content;
      if (modalMount) modalMount.innerHTML = snap.modal;
      if (subnav) subnav.innerHTML = snap.subnav;

      // Trigger the download
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const dateStr = new Date().toISOString().split('T')[0];
      a.download = `master_ops_${dateStr}.html`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (err) {
      console.error('[Master Ops] Save to file failed:', err);
      alert('Save to file failed — see the browser console for details.');
    }
  }
  window.rcSaveToFile = saveToFile;

  async function loadAll() {

    // If the file has a snapshot, replace whatever was in browser storage with it.
    const embedded = loadEmbeddedData();

      await applyEmbeddedSnapshot(embedded);
      // Restore the delete lock if the file carries one (otherwise leave the local lock alone)
      if (embedded.deletePasswordHash) {
        setPasswordHashLocal(embedded.deletePasswordHash);
      }
    }
    const siteKeys = await slist('site:');
    const contactKeys = await slist('contact:');
    const sites = [];
    for (const k of siteKeys) {
      const v = await sget(k);
      if (v) { try { sites.push(JSON.parse(v)); } catch(e) {} }
    }
    const contacts = [];
    for (const k of contactKeys) {
      const v = await sget(k);
      if (v) { try { contacts.push(JSON.parse(v)); } catch(e) {} }
    }
    sites.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    if (sites.length === 0) {
      // Seed sample data
      for (const ss of SAMPLE_SITES) {
        const site = {
          id: uid('site'),
          name: ss.name,

          address: ss.address || '',

          pocEmail: ss.pocEmail || '',
          accountManager: ss.accountManager || '',
          shifts: ss.shifts || emptyShifts(),
          timeZone: ss.timeZone || '',
          hidden: false,
          createdAt: Date.now() + sites.length
        };
        await sset('site:' + site.id, JSON.stringify(site));
        sites.push(site);
        for (const c of ss.contacts) {
          const contact = {
            id: uid('contact'),
            siteId: site.id,
            restaurantName: c.restaurantName,
            profileUrl: c.profileUrl || '',
            contactName: c.contactName,
            cuisineType: c.cuisineType,
            market: c.market || '',
            phones: c.phones || (c.phone ? [c.phone] : []),
            email: c.email,
            notes: c.notes || '',
            status: c.status || 'active',
            statusReason: c.statusReason || '',
            statusDate: c.statusDate || '',
            performance: c.performance || '',
            isNew: !!c.isNew,
            updatedAt: Date.now(),
          };
          await sset('contact:' + contact.id, JSON.stringify(contact));
          contacts.push(contact);
        }
      }
    }
    state.sites = sites;
    state.contacts = contacts;

    // Load manual requests
    const requestKeys = await slist('request:');
    const requests = [];
    for (const k of requestKeys) {
      const v = await sget(k);
      if (v) { try { requests.push(JSON.parse(v)); } catch(e) {} }
    }
    requests.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    state.requests = requests;

    // Normalize order: any (site, status) group with at least one missing order gets sequential orders
    // assigned (current sort order: existing order first, alphabetical fallback). Idempotent.
    const groups = {};
    for (const c of state.contacts) {
      const key = c.siteId + '|' + c.status;
      (groups[key] = groups[key] || []).push(c);
    }
    for (const key in groups) {
      const list = groups[key];
      const anyMissing = list.some(c => typeof c.order !== 'number');
      if (!anyMissing) continue;
      list.sort(sortByOrder);
      for (let i = 0; i < list.length; i++) {
        if (list[i].order !== i) {
          list[i].order = i;
          await sset('contact:' + list[i].id, JSON.stringify(list[i]));
        }
      }
    }

    if (!state.activeSiteId && sites.length) state.activeSiteId = sites[0].id;
    state.formData.siteId = state.activeSiteId;
  }
  async function saveSite(site) {
    if (!site.id) {
      site.id = uid('site');
      site.createdAt = Date.now();
    }
    const ok = await sset('site:' + site.id, JSON.stringify(site));
    if (!ok) return false;
    const idx = state.sites.findIndex(s => s.id === site.id);
    if (idx >= 0) state.sites[idx] = site;
    else state.sites.push(site);
    return true;
  }
  async function deleteSiteAndContacts(siteId) {
    const toRemove = state.contacts.filter(c => c.siteId === siteId);
    for (const c of toRemove) await sdel('contact:' + c.id);
    await sdel('site:' + siteId);
    state.contacts = state.contacts.filter(c => c.siteId !== siteId);
    state.sites = state.sites.filter(s => s.id !== siteId);
  }
  async function saveContact(contact) {
    const isNewContact = !contact.id;
    const previous = isNewContact ? null : state.contacts.find(c => c.id === contact.id);
    if (isNewContact) contact.id = uid('contact');
    contact.updatedAt = Date.now();
    // Ensure phones is an array; drop legacy single phone field
    if (!Array.isArray(contact.phones)) {
      contact.phones = contact.phone ? [contact.phone] : [];
    }
    delete contact.phone;
    // Assign order: new contact OR existing contact whose status just changed (move to end of new section)
    const statusChanged = previous && previous.status !== contact.status;
    if (isNewContact || statusChanged || typeof contact.order !== 'number') {
      const others = state.contacts.filter(c =>
        c.siteId === contact.siteId && c.status === contact.status && c.id !== contact.id
      );
      const maxOrder = others.reduce((m, c) => Math.max(m, c.order ?? -1), -1);
      contact.order = maxOrder + 1;
    }
    if (contact.status === 'active') {
      contact.statusReason = '';
      contact.statusDate = '';
    } else if (!contact.statusDate) {
      contact.statusDate = todayISO();
    }
    const ok = await sset('contact:' + contact.id, JSON.stringify(contact));
    if (!ok) return false;
    const idx = state.contacts.findIndex(c => c.id === contact.id);
    if (idx >= 0) state.contacts[idx] = contact;
    else state.contacts.push(contact);
    render();
    return true;
  }

  async function reorderContact(draggedId, targetId, insertBefore, status) {
    if (draggedId === targetId) return;
    const list = state.contacts
      .filter(c => c.siteId === state.activeSiteId && c.status === status)
      .sort(sortByOrder);
    const draggedIdx = list.findIndex(c => c.id === draggedId);
    if (draggedIdx === -1) return;
    const [dragged] = list.splice(draggedIdx, 1);
    let targetIdx = list.findIndex(c => c.id === targetId);
    if (targetIdx === -1) return;
    if (!insertBefore) targetIdx++;
    list.splice(targetIdx, 0, dragged);
    // Reassign sequential orders and persist any that changed
    for (let i = 0; i < list.length; i++) {
      if (list[i].order !== i) {
        list[i].order = i;
        list[i].updatedAt = Date.now();
        await sset('contact:' + list[i].id, JSON.stringify(list[i]));
      }
    }
    render();
  }

  async function removeContact(id) {
    await sdel('contact:' + id);
    state.contacts = state.contacts.filter(c => c.id !== id);
    for (const status of STATUS_ORDER) state.selectedIds[status].delete(id);
    if (state.editingContactId === id) {
      state.editingContactId = null;
      state.formData = emptyForm();
      state.formData.siteId = state.activeSiteId;
      state.cuisineOtherActive = false;
    }
    render();
  }

  /* ══════════════════ Manual Requests ══════════════════ */
  function handleReqTypeChange() {
    const type = document.getElementById('rc-req-type')?.value || 'onetime';
    const dateRow = document.getElementById('rc-req-date-row');
    const freqRow = document.getElementById('rc-req-freq-row');
    if (dateRow) dateRow.style.display = type === 'rolling' ? 'none' : '';
    if (freqRow) freqRow.style.display = type === 'rolling' ? '' : 'none';
  }
  function handleReqRestChange() {
    const restSel = document.getElementById('rc-req-restaurant');
    const cuisineSel = document.getElementById('rc-req-cuisine');
    if (restSel && cuisineSel && restSel.value) cuisineSel.value = '';
  }
  function handleReqCuisineChange() {
    const restSel = document.getElementById('rc-req-restaurant');
    const cuisineSel = document.getElementById('rc-req-cuisine');
    if (restSel && cuisineSel && cuisineSel.value) restSel.value = '';
  }

  async function submitRequest() {
    state.requestError = '';
    const type = document.getElementById('rc-req-type')?.value || 'onetime';
    const siteId = document.getElementById('rc-req-site')?.value || '';
    const restaurantId = document.getElementById('rc-req-restaurant')?.value || '';
    const cuisine = (document.getElementById('rc-req-cuisine')?.value || '').trim();
    const date = document.getElementById('rc-req-date')?.value || '';
    const frequency = (document.getElementById('rc-req-frequency')?.value || '').trim();
    const notes = (document.getElementById('rc-req-notes')?.value || '').trim();

    if (!siteId) { state.requestError = 'Pick an account.'; render(); return; }
    if (!restaurantId && !cuisine) { state.requestError = 'Pick a restaurant or a cuisine.'; render(); return; }
    if (type === 'onetime' && !date) { state.requestError = 'Pick a requested date.'; render(); return; }
    if (type === 'rolling' && !frequency) { state.requestError = 'Describe the rolling schedule.'; render(); return; }

    const site = state.sites.find(s => s.id === siteId);
    const restaurant = restaurantId ? state.contacts.find(c => c.id === restaurantId) : null;
    const target = restaurant ? restaurant.restaurantName : `Any ${cuisine} cuisine`;

    const req = {
      id: uid('req'),
      type,
      siteId,
      siteName: site ? site.name : '',
      restaurantId: restaurantId || '',
      restaurantName: restaurant ? restaurant.restaurantName : '',
      cuisine: cuisine || '',
      target,
      date: type === 'onetime' ? date : '',
      frequency: type === 'rolling' ? frequency : '',
      notes,
      createdAt: Date.now(),
    };
    const ok = await sset('request:' + req.id, JSON.stringify(req));
    if (!ok) { state.requestError = 'Could not save the request.'; render(); return; }
    state.requests.unshift(req);
    render();
  }

  function clearRequestForm() {
    state.requestError = '';
    const typeEl = document.getElementById('rc-req-type');
    if (typeEl) typeEl.value = 'onetime';
    const ids = ['rc-req-restaurant', 'rc-req-cuisine', 'rc-req-frequency', 'rc-req-notes'];
    for (const id of ids) { const el = document.getElementById(id); if (el) el.value = ''; }
    const dateEl = document.getElementById('rc-req-date');
    if (dateEl) dateEl.value = nextMonthFirstISO();
    handleReqTypeChange();
    // Re-set account default to active site
    const siteEl = document.getElementById('rc-req-site');
    if (siteEl && state.activeSiteId) siteEl.value = state.activeSiteId;
  }

  async function removeRequest(id) {
    await sdel('request:' + id);
    state.requests = state.requests.filter(r => r.id !== id);
    render();
  }

  /* ══════════════════ Site actions ══════════════════ */
  function rcOpenSiteForm(siteId) {
    const customMode = new Set();
    if (siteId) {
      const site = state.sites.find(s => s.id === siteId);
      if (!site) return;
      const shifts = getShifts(site);
      SHIFT_TYPES.forEach(s => {
        // If a shift has days that don't match any preset, treat it as custom
        if (shifts[s.key].days.length > 0 && detectPreset(shifts[s.key].days) === null) {
          customMode.add(s.key);
        }
      });
      state.modalState = {
        isEdit: true,
        siteId: site.id,
        name: site.name || '',
        snappeaLink: site.snappeaLink || '',
        address: site.address || '',
        pocName: site.pocName || '',
        pocEmail: site.pocEmail || '',
        accountManager: site.accountManager || '',
        shifts,
        timeZone: site.timeZone || '',
        customMode,
        error: '',
      };
    } else {
      state.modalState = {
        isEdit: false,
        siteId: '',
        name: '',
        snappeaLink: '',
        address: '',
        pocName: '',
        pocEmail: '',
        accountManager: '',
        shifts: emptyShifts(),
        timeZone: '',
        customMode,
        error: '',
      };
    }
    state.modal = 'siteForm';
    render();
    setTimeout(() => document.getElementById('rc-sf-name')?.focus(), 50);
  }

  function readSiteFormFields() {
    return {
      name:           (document.getElementById('rc-sf-name')?.value || '').trim(),
      snappeaLink:    (document.getElementById('rc-sf-snappeaLink')?.value || '').trim(),
      address:        (document.getElementById('rc-sf-address')?.value || '').trim(),
      pocName:        (document.getElementById('rc-sf-pocName')?.value || '').trim(),
      pocEmail:       (document.getElementById('rc-sf-pocEmail')?.value || '').trim(),
      accountManager: (document.getElementById('rc-sf-accountManager')?.value || '').trim(),
      timeZone:       document.getElementById('rc-sf-timeZone')?.value || '',
    };
  }
  function readShiftFields() {
    // Reads start/end from inputs; days come from state.modalState.shifts (toggled in handlers)
    const out = emptyShifts();
    SHIFT_TYPES.forEach(s => {
      out[s.key].start = document.getElementById(`rc-sf-shift-${s.key}-start`)?.value || '';
      out[s.key].end   = document.getElementById(`rc-sf-shift-${s.key}-end`)?.value || '';
      const inState = state.modalState.shifts && state.modalState.shifts[s.key];
      out[s.key].days = inState && Array.isArray(inState.days) ? inState.days.slice() : [];
    });
    return out;
  }

  async function submitSiteForm() {
    const fields = readSiteFormFields();
    const shifts = readShiftFields();
    Object.assign(state.modalState, fields, { shifts });

    if (!fields.name)        return setSiteFormError('Site name is required.', 'rc-sf-name');
    if (!fields.snappeaLink) return setSiteFormError('Snappea Link is required.', 'rc-sf-snappeaLink');
    if (!safeUrl(fields.snappeaLink)) return setSiteFormError('Snappea Link must start with http:// or https://.', 'rc-sf-snappeaLink');
    if (!fields.address)     return setSiteFormError('Address is required.', 'rc-sf-address');
    if (!fields.pocName)     return setSiteFormError('POC / GMA Name is required.', 'rc-sf-pocName');
    if (!fields.pocEmail)    return setSiteFormError('POC / GMA Email is required.', 'rc-sf-pocEmail');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(fields.pocEmail)) return setSiteFormError('POC / GMA Email must be a valid email address.', 'rc-sf-pocEmail');
    if (!fields.accountManager) return setSiteFormError('Account Manager is required.', 'rc-sf-accountManager');
    if (!fields.timeZone)    return setSiteFormError('Time zone is required.', 'rc-sf-timeZone');

    // Shifts: at least one shift must be configured (have days picked).
    // Any shift with days picked must also have valid start and end times.
    const labelFor = key => SHIFT_TYPES.find(s => s.key === key)?.label || key;
    const configured = SHIFT_TYPES.map(s => s.key).filter(k => shifts[k].days.length > 0);
    if (!configured.length) return setSiteFormError('Add at least one shift — pick days for Breakfast, Lunch, Shift Change, or Dinner.');
    for (const k of configured) {
      if (!shifts[k].start || !shifts[k].end) {
        return setSiteFormError(`${labelFor(k)} needs both a start and end time.`, `rc-sf-shift-${k}-start`);
      }
      if (shifts[k].end <= shifts[k].start) {
        return setSiteFormError(`${labelFor(k)} end time must be after its start time.`, `rc-sf-shift-${k}-end`);
      }
    }

    let site;
    if (state.modalState.isEdit) {
      site = state.sites.find(s => s.id === state.modalState.siteId);
      if (!site) return;
      Object.assign(site, fields, { shifts });
      // Drop legacy text field if it exists
      if ('shiftTimes' in site) delete site.shiftTimes;
    } else {
      site = Object.assign({ id: '', hidden: false }, fields, { shifts });
    }
    const ok = await saveSite(site);
    if (ok) {
      if (!state.modalState.isEdit) {
        state.activeSiteId = site.id;
        state.formData.siteId = site.id;
      }
      state.modal = null;
      state.modalState = {};
      render();
    }
  }

  function setSiteFormError(msg, focusId) {
    state.modalState.error = msg;
    render();
    if (focusId) setTimeout(() => document.getElementById(focusId)?.focus(), 50);
  }

  async function hideSite(siteId) {
    const site = state.sites.find(s => s.id === siteId);
    if (!site) return;
    site.hidden = true;
    await saveSite(site);
    // If the hidden site was active, switch to the next visible one
    if (state.activeSiteId === siteId) {
      const next = state.sites.find(s => !s.hidden);
      state.activeSiteId = next?.id || null;
      state.formData.siteId = state.activeSiteId;
    }
    if (state.modal === 'siteForm') {
      state.modal = null;
      state.modalState = {};
    }
    render();
  }

  async function showSite(siteId) {
    const site = state.sites.find(s => s.id === siteId);
    if (!site) return;
    site.hidden = false;
    await saveSite(site);
    if (!state.activeSiteId) {
      state.activeSiteId = siteId;
      state.formData.siteId = siteId;
    }
    render();
  }

  async function deleteSite(siteId) {
    const site = state.sites.find(s => s.id === siteId);
    if (!site) return;
    const count = state.contacts.filter(c => c.siteId === siteId).length;
    const msg = count > 0
      ? `Delete site "${site.name}" and all ${count} contact${count===1?'':'s'}? This cannot be undone.`
      : `Delete site "${site.name}"?`;
    if (!confirm(msg)) return;
    await deleteSiteAndContacts(siteId);
    if (state.activeSiteId === siteId) {
      state.activeSiteId = state.sites.find(s => !s.hidden)?.id || null;
      state.formData.siteId = state.activeSiteId;
    }
    if (state.modal === 'siteForm') {
      state.modal = null;
      state.modalState = {};
    }
    render();
  }

  // Routes a contact deletion through the password modal if a lock is set, otherwise falls back to confirm()
  function requestDeleteContact(id) {
    const contact = state.contacts.find(c => c.id === id);
    if (!contact) return;
    if (!isDeleteLockEnabled()) {
      if (confirm(`Remove "${contact.restaurantName}"? This cannot be undone.`)) removeContact(id);
      return;
    }
    state.modal = 'deleteConfirm';
    state.modalState = {
      deleteType: 'contact',
      deleteId: id,
      deleteName: contact.restaurantName,
      error: '',
    };
    render();
  }

  // Routes a site deletion through the password modal if a lock is set
  function requestDeleteSite(siteId) {
    const site = state.sites.find(s => s.id === siteId);
    if (!site) return;
    if (!isDeleteLockEnabled()) return deleteSite(siteId);
    const count = state.contacts.filter(c => c.siteId === siteId).length;
    state.modal = 'deleteConfirm';
    state.modalState = {
      deleteType: 'site',
      deleteId: siteId,
      deleteName: site.name,
      deleteContactCount: count,
      error: '',
    };
    render();
  }

  async function submitDeleteWithPassword() {
    const password = (document.getElementById('rc-pw-input')?.value || '');
    if (!password) {
      state.modalState.error = 'Password is required.';
      render();
      return;
    }
    const ok = await verifyPassword(password);
    if (!ok) {
      state.modalState.error = 'Incorrect password.';
      render();
      setTimeout(() => {
        const el = document.getElementById('rc-pw-input');
        if (el) { el.value = ''; el.focus(); }
      }, 30);
      return;
    }
    const { deleteType, deleteId } = state.modalState;
    state.modal = null;
    state.modalState = {};
    if (deleteType === 'contact') {
      await removeContact(deleteId);
    } else if (deleteType === 'site') {
      await deleteSiteAndContacts(deleteId);
      if (state.activeSiteId === deleteId) {
        state.activeSiteId = state.sites.find(s => !s.hidden)?.id || null;
        state.formData.siteId = state.activeSiteId;
      }
      if (state.modal === 'siteForm') {
        state.modal = null;
        state.modalState = {};
      }
    }
    render();
  }

  function rcOpenPasswordSetup() {
    state.modal = 'passwordSetup';
    state.modalState = { error: '' };
    render();
  }

  async function submitPasswordSetup() {
    const ms = state.modalState || {};
    const hasLock = isDeleteLockEnabled();
    const currentPw = (document.getElementById('rc-pw-current')?.value || '');
    const newPw = (document.getElementById('rc-pw-new')?.value || '');
    const confirmPw = (document.getElementById('rc-pw-confirm')?.value || '');

    if (hasLock) {
      if (!currentPw) { ms.error = 'Enter your current password.'; render(); return; }
      const ok = await verifyPassword(currentPw);
      if (!ok) { ms.error = 'Current password is incorrect.'; render(); return; }
    }
    if (!newPw) { ms.error = 'New password cannot be blank. Use "Remove Lock" to disable.'; render(); return; }
    if (newPw.length < 4) { ms.error = 'Password should be at least 4 characters.'; render(); return; }
    if (newPw !== confirmPw) { ms.error = 'New password and confirmation do not match.'; render(); return; }

    const hash = await hashPassword(newPw);
    setPasswordHashLocal(hash);
    state.modal = null;
    state.modalState = {};
    render();
  }

  async function submitRemoveLock() {
    const ms = state.modalState || {};
    const currentPw = (document.getElementById('rc-pw-current')?.value || '');
    if (!currentPw) { ms.error = 'Enter your current password to remove the lock.'; render(); return; }
    const ok = await verifyPassword(currentPw);
    if (!ok) { ms.error = 'Current password is incorrect.'; render(); return; }
    clearPasswordHashLocal();
    state.modal = null;
    state.modalState = {};
    render();
  }
  window.rcOpenPasswordSetup = rcOpenPasswordSetup;

  function rcOpenHiddenSites() {
    state.modal = 'hiddenSites';
    state.modalState = {};
    render();
  }

  /* ══════════════════ Form helpers ══════════════════ */
  function rcOpenNewForm() {
    if (!getActiveSite()) { alert('Add a site before adding a vendor.'); return; }
    state.editingContactId = null;
    state.formData = emptyForm();
    state.formData.siteId = state.activeSiteId;
    state.cuisineOtherActive = false;
    state.formError = '';
    state.modal = 'form';
    render();
    setTimeout(() => document.getElementById('rc-f-restaurantName')?.focus(), 50);
  }
  function startEdit(id) {
    const c = state.contacts.find(x => x.id === id);
    if (!c) return;
    state.editingContactId = id;
    state.formData = {
      restaurantName: c.restaurantName || '',
      profileUrl: c.profileUrl || '',
      contactName: c.contactName || '',
      cuisineType: c.cuisineType || '',
      market: c.market || '',
      phones: getPhones(c).length ? getPhones(c) : [''],
      email: c.email || '',
      notes: c.notes || '',
      status: c.status || 'active',

    state.modal = null;
