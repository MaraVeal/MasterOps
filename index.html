  }
  async function submitForm() {
    state.formData.restaurantName = (document.getElementById('rc-f-restaurantName')?.value || '').trim();
    state.formData.profileUrl     = (document.getElementById('rc-f-profileUrl')?.value || '').trim();
    state.formData.contactName    = (document.getElementById('rc-f-contactName')?.value || '').trim();
    {
      const sel = document.getElementById('rc-f-cuisineType')?.value || '';
      const other = (document.getElementById('rc-f-cuisineType-other')?.value || '').trim();
      state.formData.cuisineType  = sel === '__other__' ? other : sel;
    }
    state.formData.market         = (document.getElementById('rc-f-market')?.value || '').trim();
    state.formData.phones = Array.from(document.querySelectorAll('.rc-phone-input'))
      .map(el => formatPhone((el.value || '').trim()))
      .filter(p => p.length > 0);
    state.formData.email          = (document.getElementById('rc-f-email')?.value || '').trim();
    state.formData.notes          = (document.getElementById('rc-f-notes')?.value || '').trim();
    state.formData.statusReason   = (document.getElementById('rc-f-statusReason')?.value || '').trim();
    state.formData.statusDate     = (document.getElementById('rc-f-statusDate')?.value || '').trim();
    state.formData.isNew          = !!document.getElementById('rc-f-isNew')?.checked;
    state.formData.siteId         = document.getElementById('rc-f-siteId')?.value || state.formData.siteId || state.activeSiteId;

    if (!state.formData.restaurantName) { state.formError = 'Restaurant name is required.'; render(); return; }
    if (!state.formData.contactName)    { state.formError = 'Contact name is required.';    render(); return; }
    if (!state.formData.profileUrl) {
      state.formError = 'Snappea URL is required.';
      render();
      setTimeout(() => document.getElementById('rc-f-profileUrl')?.focus(), 50);
      return;
    }
    if (!safeUrl(state.formData.profileUrl)) {
      state.formError = 'Snappea URL must start with http:// or https://.';
      render();
      setTimeout(() => document.getElementById('rc-f-profileUrl')?.focus(), 50);
      return;
    }
    {
      const sel = document.getElementById('rc-f-cuisineType')?.value || '';
      if (!sel) {
        state.formError = 'Cuisine type is required.';
        render();
        setTimeout(() => document.getElementById('rc-f-cuisineType')?.focus(), 50);
        return;
      }
      if (sel === '__other__' && !state.formData.cuisineType) {
        state.formError = 'Please specify the cuisine type when "Other" is selected.';
        state.cuisineOtherActive = true;
        render();
        setTimeout(() => document.getElementById('rc-f-cuisineType-other')?.focus(), 50);
        return;
      }
    }
    if (!state.formData.market) {
      state.formError = 'Market is required.';
      render();
      setTimeout(() => document.getElementById('rc-f-market')?.focus(), 50);
      return;
    }
    if (!state.formData.phones.length) {
      state.formError = 'At least one phone number is required.';
      render();
      setTimeout(() => document.querySelector('.rc-phone-input')?.focus(), 50);
      return;
    }
    if (!state.formData.email) {
      state.formError = 'Email is required.';
      render();
      setTimeout(() => document.getElementById('rc-f-email')?.focus(), 50);
      return;
    }
    if (state.formData.status !== 'active') {
      if (!state.formData.statusReason) {
        state.formError = `A reason is required when status is "${STATUS_LABEL[state.formData.status]}".`;
        render();
        setTimeout(() => document.getElementById('rc-f-statusReason')?.focus(), 50);
        return;
      }
      if (!state.formData.statusDate) {
        state.formError = `An effective date is required when status is "${STATUS_LABEL[state.formData.status]}".`;
        render();
        setTimeout(() => document.getElementById('rc-f-statusDate')?.focus(), 50);
        return;
      }
    }
    const payload = Object.assign({}, state.formData);
    if (state.editingContactId) payload.id = state.editingContactId;
    const ok = await saveContact(payload);
    if (ok) {
      state.editingContactId = null;
      state.formData = emptyForm();
      state.formData.siteId = state.activeSiteId;
      state.cuisineOtherActive = false;
      state.formError = '';
      state.modal = null;
      render();
    }
  }

  /* ══════════════════ Bulk add ══════════════════ */
  function rcOpenBulkAdd() {
    state.modal = 'bulkAdd';
    state.modalState = { raw: '', parsed: [], error: '' };
    render();
  }
  function rcCloseModal() {
    state.modal = null;
    state.modalState = {};
    render();
  }
  function normalizeBulkRow(row) {
    row.status = (row.status || 'active').toLowerCase();
    if (!STATUS_ORDER.includes(row.status)) row.status = 'active';
    if (row.status !== 'active' && !row.statusDate) row.statusDate = todayISO();
    if (row.statusDate) {
      const parsed = parseDateInput(row.statusDate);
      row.statusDate = parsed === null ? '' : parsed;
    }
    if (row.phones) {
      row.phones = String(row.phones).split(/[;|]/).map(p => formatPhone(p.trim())).filter(Boolean);
    } else {
      row.phones = [];
    }
    row.performance = (row.performance || '').toLowerCase();
    if (!['high','average','low'].includes(row.performance)) row.performance = '';
    return row;
  }

  // Reads an .xlsx/.xls/.csv File and returns a Promise resolving to { rows, error }.
  function parseExcelFile(file) {
    return new Promise(resolve => {
      if (typeof XLSX === 'undefined') {
        return resolve({ rows: [], error: 'Excel library failed to load. Check your internet connection and reopen this modal.' });
      }
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          if (!workbook.SheetNames.length) return resolve({ rows: [], error: 'The file has no sheets.' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: false });
          const trimmed = aoa.filter(r => r.some(cell => String(cell || '').trim().length));
          if (trimmed.length < 2) return resolve({ rows: [], error: 'Need at least a header row and one data row.' });

          const headers = trimmed[0].map(h => String(h || '').trim().toLowerCase());
          const fieldMap = {};
          headers.forEach((h, i) => {
            for (const [field, aliases] of Object.entries(FIELD_ALIASES)) {
              if (aliases.includes(h)) { fieldMap[field] = i; break; }
            }
          });
          if (!('restaurantName' in fieldMap) || !('contactName' in fieldMap)) {
            return resolve({ rows: [], error: 'Headers must include at least Restaurant Name and Contact Name.' });
          }

          const rows = [];
          for (let i = 1; i < trimmed.length; i++) {
            const cells = trimmed[i];
            const row = {};
            for (const [field, idx] of Object.entries(fieldMap)) {
              row[field] = String(cells[idx] || '').trim();
            }
            if (!row.restaurantName || !row.contactName) continue;
            rows.push(normalizeBulkRow(row));
          }
          if (!rows.length) return resolve({ rows: [], error: 'No valid rows. Each row needs at least Restaurant Name and Contact Name.' });
          resolve({ rows });
        } catch (err) {
          resolve({ rows: [], error: 'Could not read this file. Make sure it is a valid .xlsx, .xls, or .csv.' });
        }
      };
      reader.onerror = () => resolve({ rows: [], error: 'Failed to read file.' });
      reader.readAsArrayBuffer(file);
    });
  }

  async function rcBulkFileSelected(file) {
    if (!file) return;
    state.modalState.fileName = file.name;
    state.modalState.parsing = true;
    state.modalState.error = '';
    state.modalState.parsed = [];
    render();
    const { rows, error } = await parseExcelFile(file);
    state.modalState.parsing = false;
    state.modalState.error = error || '';
    state.modalState.parsed = rows;
    render();
  }

  async function rcBulkSubmit() {
    const rows = state.modalState.parsed || [];
    if (!rows.length) {
      state.modalState.error = 'No rows to import. Choose a file first.';
      render();
      return;
    }
    const activeSite = getActiveSite();
    if (!activeSite) return;
    for (const row of rows) {
      const id = uid('contact');
      const contact = {
        id,
        restaurantName: row.restaurantName,
        profileUrl: row.profileUrl || '',
        contactName: row.contactName,
        cuisineType: row.cuisineType || '',
        phones: row.phones || [],
        email: row.email || '',
        notes: row.notes || '',
        status: row.status || 'active',
        statusReason: row.statusReason || '',
        statusDate: row.statusDate || '',
        performance: row.performance || '',
        isNew: true,
        siteId: activeSite.id,
        updatedAt: Date.now(),
      };
      await sset('contact:' + id, JSON.stringify(contact));
      state.contacts.push(contact);
    }
    rcCloseModal();
  }

  /* ══════════════════ Bulk email ══════════════════ */
  function rcOpenEmail(status) {
    const ids = Array.from(state.selectedIds[status] || []);
    if (!ids.length) return;
    const recipients = state.contacts
      .filter(c => ids.includes(c.id))
      .map(c => ({ name: c.contactName, email: c.email, restaurant: c.restaurantName }))
      .filter(r => r.email);
    if (!recipients.length) { alert('No selected contacts have an email address.'); return; }
    state.modal = 'email';
    state.modalState = { status, recipients, subject: '', body: '' };
    render();
  }

  // Top-level bulk email — chooser for any contact in active site, defaults to Active only
  function rcOpenBulkEmail() {
    const activeSite = getActiveSite();
    if (!activeSite) { alert('Add a site before sending bulk emails.'); return; }
    const anySiteHasEmails = state.sites.some(s =>
      !s.hidden && state.contacts.some(c => c.siteId === s.id && c.email)
    );
    if (!anySiteHasEmails) { alert('No contacts with email addresses across your sites.'); return; }
    const initialSiteIds = new Set([activeSite.id]);
    const defaultSelected = new Set(
      state.contacts
        .filter(c => c.siteId === activeSite.id && c.email && c.status === 'active')
        .map(c => c.id)
    );
    state.modal = 'bulkEmail';
    state.modalState = {
      siteIds: initialSiteIds,
      selected: defaultSelected,
      subject: '',
      body: '',
    };
    render();
  }
  // Derive current recipient list whether we're in the per-section or bulk-email modal
  function rcEmailRecipients() {
    if (state.modal === 'bulkEmail') {
      const selected = state.modalState.selected || new Set();
      return state.contacts
        .filter(c => selected.has(c.id) && c.email)
        .map(c => ({ name: c.contactName, email: c.email, restaurant: c.restaurantName }));
    }
    return state.modalState.recipients || [];
  }

  function rcEmailCopy() {
    const recipients = rcEmailRecipients();
    const emails = recipients.map(r => r.email).join('; ');
    navigator.clipboard?.writeText(emails);
    const btn = document.getElementById('rc-email-copy-btn');
    if (btn) { const orig = btn.textContent; btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = orig; }, 1200); }
  }
  function rcEmailSend(mode) {
    const recipients = rcEmailRecipients();
    if (!recipients.length) { alert('No recipients selected.'); return; }
    const isSingle = recipients.length === 1;
    const subject = (document.getElementById('rc-email-subject')?.value || '').trim();
    const body    = (document.getElementById('rc-email-body')?.value || '').trim();

    if (mode === 'outlook') {
      const params = new URLSearchParams();
      if (subject) params.set('subject', subject);
      if (body) params.set('body', body);
      if (isSingle) {
        // Single recipient → TO field (Outlook supports this in the deeplink)
        params.set('to', recipients[0].email);
        const url = 'https://outlook.office.com/mail/deeplink/compose?' + params.toString();
        window.open(url, '_blank');
      } else {
        // Multiple → Outlook's deeplink can't carry BCC reliably, so copy and instruct
        const emailsSemi = recipients.map(r => r.email).join('; ');
        navigator.clipboard?.writeText(emailsSemi);
        const url = 'https://outlook.office.com/mail/deeplink/compose?' + params.toString();
        window.open(url, '_blank');
        alert('Outlook Web is opening. Emails have been copied to your clipboard — paste them into the BCC field.');
      }
    } else {
      const params = [];
      if (subject) params.push('subject=' + encodeURIComponent(subject));
      if (body) params.push('body=' + encodeURIComponent(body));
      if (isSingle) {
        // Single recipient → TO field
        const url = 'mailto:' + encodeURIComponent(recipients[0].email) + (params.length ? '?' + params.join('&') : '');
        window.location.href = url;
      } else {
        // Multiple → BCC for privacy
        const bccComma = recipients.map(r => r.email).join(',');
        params.push('bcc=' + encodeURIComponent(bccComma));
        const url = 'mailto:?' + params.join('&');
        window.location.href = url;
      }
    }
  }

  /* ══════════════════ Derived ══════════════════ */
  function getActiveSite() { return state.sites.find(s => s.id === state.activeSiteId) || null; }
  function getSiteCounts(siteId) {
    const counts = { active: 0, paused: 0, terminated: 0, total: 0 };
    for (const c of state.contacts) {
      if (c.siteId !== siteId) continue;
      counts.total++;
      if (counts[c.status] != null) counts[c.status]++;
    }
    return counts;
  }
  function getFilteredContacts(status) {
    const q = (state.search || '').toLowerCase().trim();
    return state.contacts
      .filter(c => c.siteId === state.activeSiteId && c.status === status)
      .filter(c => {
        if (!q) return true;
        const phoneStr = getPhones(c).join(' ');
        return [c.restaurantName, c.contactName, c.cuisineType, c.market, c.email, phoneStr, c.notes]
          .some(v => (v || '').toLowerCase().includes(q));
      })
      .sort(sortByOrder);
  }

      return [c.restaurantName, c.contactName, c.email, phones, c.notes, c.cuisineType, c.market]
        .filter(Boolean).join(' ').toLowerCase().includes(q);

    return { sites, contacts };

        ${contacts.map(c => {
          const site = state.sites.find(s => s.id === c.siteId);

          const metaBits = [
            site ? `at ${escapeHtml(site.name)}` : '',
            c.contactName ? escapeHtml(c.contactName) : '',
            phones[0] ? escapeHtml(phones[0]) : '',
            c.email ? escapeHtml(c.email) : ''

    return `<div class="rc-search-results">${sitesHtml}${contactsHtml}</div>`;

  function nextMonthFirstISO() {
    const d = new Date();
    const y = d.getFullYear();
    const m = d.getMonth() + 1; // 0-based -> next month
    const yy = m > 11 ? y + 1 : y;
    const mm = ((m % 12) + 1).toString().padStart(2, '0');
    return `${yy}-${mm}-01`;
  }

  function renderModal() {

    if (!mount) return;
    if (!state.modal) { mount.innerHTML = ''; return; }
    if (state.modal === 'bulkAdd')      return renderBulkAddModal(mount);
    if (state.modal === 'email')        return renderEmailModal(mount);
    if (state.modal === 'bulkEmail')    return renderBulkEmailModal(mount);
    if (state.modal === 'form')         return renderFormModal(mount);
    if (state.modal === 'siteForm')     return renderSiteFormModal(mount);
    if (state.modal === 'hiddenSites')  return renderHiddenSitesModal(mount);
    if (state.modal === 'help')         return renderHelpModal(mount);
    if (state.modal === 'deleteConfirm') return renderDeleteConfirmModal(mount);
    if (state.modal === 'passwordSetup') return renderPasswordSetupModal(mount);
    if (state.modal === 'requests')      return renderRequestsModal(mount);

  /* ══════════════════ Master render + handlers ══════════════════ */
  function render() {
    // Preserve modal scroll position so clicking checkboxes/buttons doesn't snap the modal back to the top
    const oldModalCard = document.querySelector('.rc-modal-card');
    const modalScrollTop = oldModalCard ? oldModalCard.scrollTop : 0;
    // Also remember which element had focus, so checkbox/button focus survives the render
    const activeEl = document.activeElement;
    const activeId = activeEl && activeEl.id ? activeEl.id : '';
    const activeAttrs = (activeEl && !activeEl.id && activeEl !== document.body) ? {
      tag: activeEl.tagName,
      cls: activeEl.className,
      dataId: activeEl.getAttribute('data-id'),
      dataStatus: activeEl.getAttribute('data-status'),
      dataAction: activeEl.getAttribute('data-action'),
    } : null;

    renderSubnav();
    renderMain();
    renderModal();
    bindEvents();

    // Update the New Request button badge with the pending count
    const reqCountEl = document.getElementById('rc-new-request-count');
    if (reqCountEl) {
      const n = (state.requests || []).length;
      if (n > 0) { reqCountEl.textContent = n; reqCountEl.style.display = 'inline-block'; }
      else { reqCountEl.style.display = 'none'; }
    }

    // Restore modal scroll position
    if (modalScrollTop > 0) {
      const newModalCard = document.querySelector('.rc-modal-card');
      if (newModalCard) newModalCard.scrollTop = modalScrollTop;
    }
    // Restore focus on the element that had it, when possible
    if (state._focusId) {
      const el = document.getElementById(state._focusId);
      if (el) {
        el.focus();
        if (el.value != null) { const v = el.value; el.value = ''; el.value = v; }
      }
      state._focusId = null;
    } else if (activeId) {
      const el = document.getElementById(activeId);
      if (el) el.focus();
    } else if (activeAttrs) {
      // Best-effort: find a same-shape element to refocus (e.g. the same checkbox in the rebuilt modal)
      const selectors = [];
      if (activeAttrs.dataId)     selectors.push(`[data-id="${activeAttrs.dataId}"]`);
      if (activeAttrs.dataStatus) selectors.push(`[data-status="${activeAttrs.dataStatus}"]`);
      if (activeAttrs.dataAction) selectors.push(`[data-action="${activeAttrs.dataAction}"]`);
      if (selectors.length) {
        const candidate = document.querySelector(activeAttrs.tag.toLowerCase() + selectors.join(''));
        if (candidate) candidate.focus();
      }
    }
  }

  function bindEvents() {
    // Site dropdown toggle
    document.querySelectorAll('[data-action="toggle-site-dropdown"]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        state.siteDropdownOpen = !state.siteDropdownOpen;
        render();
      });
    });
    // Site dropdown items
    document.querySelectorAll('#rc-sites-nav .rc-site-dropdown-item').forEach(item => {
      item.addEventListener('click', e => {
        e.stopPropagation();
        const siteId = item.getAttribute('data-site');
        if (!siteId) return;
        state.activeSiteId = siteId;
        state.formData.siteId = siteId;
        state.siteDropdownOpen = false;
        for (const s of STATUS_ORDER) state.selectedIds[s].clear();
        render();
      });
    });
    // Subnav action buttons (Add Site, N hidden)
    document.querySelectorAll('#rc-sites-nav .rc-subnav-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        const action = btn.getAttribute('data-action');
        if (action === 'open-site-form') {
          const id = btn.getAttribute('data-id') || '';
          return rcOpenSiteForm(id || null);
        }
        if (action === 'open-hidden-sites') return rcOpenHiddenSites();
      });
    });
    // Site Info collapsible header
    document.querySelectorAll('[data-action="toggle-site-info"]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        state.siteInfoExpanded = !state.siteInfoExpanded;
        render();
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          state.siteInfoExpanded = !state.siteInfoExpanded;
          render();
        }
      });
    });

    // Search input
    const searchInput = document.getElementById('rc-search-input');
    if (searchInput) {
      searchInput.addEventListener('focus', e => {
        if (!state._searchFocused) {
          state._searchFocused = true;
          render();
        }
      });
      searchInput.addEventListener('input', e => {
        state.search = e.target.value;
        state._searchFocused = true;
        state._focusId = 'rc-search-input';
        render();
      });
    }

    // Clear-search button (in the global search bar)
    document.querySelectorAll('[data-action="clear-search"]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        state.search = '';
        state._searchFocused = true;
        state._focusId = 'rc-search-input';
        render();
      });
    });

    // Search dropdown: click a site result → switch to that site, clear search
    document.querySelectorAll('[data-action="search-pick-site"]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const siteId = btn.getAttribute('data-id');
        if (!siteId) return;
        state.activeSiteId = siteId;
        state.formData.siteId = siteId;
        state.search = '';
        state._searchFocused = false;
        for (const s of STATUS_ORDER) state.selectedIds[s].clear();
        render();
      });
    });

    // Search dropdown: click a contact result → switch to its site, KEEP search
    // active so the contact stays highlighted in the filtered table below
    document.querySelectorAll('[data-action="search-pick-contact"]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const siteId = btn.getAttribute('data-site');
        if (!siteId) return;
        state.activeSiteId = siteId;
        state.formData.siteId = siteId;
        state._searchFocused = false;
        for (const s of STATUS_ORDER) state.selectedIds[s].clear();
        render();
      });
    });

    // Row checkboxes
    document.querySelectorAll('.rc-row-check').forEach(cb => {
      cb.addEventListener('change', e => {
        const id = cb.getAttribute('data-id');
        const status = cb.getAttribute('data-status');
        if (cb.checked) state.selectedIds[status].add(id);
        else state.selectedIds[status].delete(id);
        render();
      });
    });

    // Row drag-and-drop for reordering (within the same section only)
    document.querySelectorAll('tr.rc-contact-row').forEach(tr => {
      tr.addEventListener('dragstart', e => {
        const id = tr.getAttribute('data-id');
        const status = tr.getAttribute('data-status');
        state._dragging = { id, status };
        try {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', id);
        } catch (err) {}
        tr.classList.add('rc-dragging');
      });
      tr.addEventListener('dragend', e => {
        tr.classList.remove('rc-dragging');
        document.querySelectorAll('tr.rc-contact-row').forEach(r => r.classList.remove('rc-drop-top', 'rc-drop-bottom'));
        state._dragging = null;
      });
      tr.addEventListener('dragover', e => {
        if (!state._dragging) return;
        const targetStatus = tr.getAttribute('data-status');
        // Only allow drop within the same section
        if (state._dragging.status !== targetStatus) {
          e.dataTransfer.dropEffect = 'none';
          return;
        }
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const rect = tr.getBoundingClientRect();
        const midpoint = rect.top + rect.height / 2;
        if (e.clientY < midpoint) {
          tr.classList.add('rc-drop-top');
          tr.classList.remove('rc-drop-bottom');
        } else {
          tr.classList.add('rc-drop-bottom');
          tr.classList.remove('rc-drop-top');
        }
      });
      tr.addEventListener('dragleave', e => {
        tr.classList.remove('rc-drop-top', 'rc-drop-bottom');
      });
      tr.addEventListener('drop', async e => {
        e.preventDefault();
        const targetId = tr.getAttribute('data-id');
        const targetStatus = tr.getAttribute('data-status');
        const insertBefore = tr.classList.contains('rc-drop-top');
        tr.classList.remove('rc-drop-top', 'rc-drop-bottom');
        if (!state._dragging) return;
        if (state._dragging.status !== targetStatus) return;
        if (state._dragging.id === targetId) return;
        await reorderContact(state._dragging.id, targetId, insertBefore, targetStatus);
        state._dragging = null;
      });
    });
    // Check all in section
    document.querySelectorAll('.rc-check-all').forEach(cb => {
      cb.addEventListener('change', e => {
        const status = cb.getAttribute('data-status');
        const list = getFilteredContacts(status);
        if (cb.checked) list.forEach(c => state.selectedIds[status].add(c.id));
        else list.forEach(c => state.selectedIds[status].delete(c.id));
        render();
      });
    });

    // Row actions + section actions
    document.querySelectorAll('[data-action]').forEach(el => {
      const action = el.getAttribute('data-action');
      // Avoid double-binding subnav-only actions
      if (['open-site-form', 'open-hidden-sites'].includes(action) && el.closest('#rc-sites-nav')) return;
      el.addEventListener('click', e => {
        e.preventDefault();
        const id = el.getAttribute('data-id');
        const status = el.getAttribute('data-status');
        switch (action) {
          case 'open-new-form':      return rcOpenNewForm();
          case 'open-site-form':     return rcOpenSiteForm(id || null);
          case 'site-submit':        return submitSiteForm();
          case 'site-hide':          return hideSite(id);
          case 'site-show':          return showSite(id);
          case 'site-delete':        return requestDeleteSite(id);
          case 'edit-contact':       return startEdit(id);
          case 'remove-contact':     return requestDeleteContact(id);
          case 'open-delete-lock':   return rcOpenPasswordSetup();
          case 'save-delete-password': return submitPasswordSetup();
          case 'remove-delete-lock': return submitRemoveLock();
          case 'confirm-delete-with-password': return submitDeleteWithPassword();
          case 'req-submit':         return submitRequest();
          case 'req-clear':          return clearRequestForm();
          case 'req-remove':         return removeRequest(id);
          case 'cancel-edit':        return cancelEdit();
          case 'submit-form':        return submitForm();
          case 'email-selected':     return rcOpenEmail(status);
          case 'clear-selected':
            state.selectedIds[status].clear();
            return render();
          case 'close-modal':        return rcCloseModal();
          case 'bulk-submit':        return rcBulkSubmit();
          case 'email-copy':         return rcEmailCopy();
          case 'email-send-default': return rcEmailSend('default');
          case 'email-send-outlook': return rcEmailSend('outlook');
        }
      });
    });

    // Form inputs (track changes without re-rendering)
    ['rc-f-restaurantName','rc-f-profileUrl','rc-f-contactName','rc-f-email','rc-f-notes','rc-f-statusReason','rc-f-statusDate'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const key = id.replace('rc-f-','');
      el.addEventListener('input', e => { state.formData[key] = e.target.value; });
    });
    // Phone inputs — auto-format each row independently
    document.querySelectorAll('.rc-phone-input').forEach(input => {
      input.addEventListener('input', e => {
        const idx = +input.getAttribute('data-idx');
        const formatted = formatPhone(e.target.value);
        e.target.value = formatted;
        if (!Array.isArray(state.formData.phones)) state.formData.phones = [];
        state.formData.phones[idx] = formatted;
      });
    });
    // Phone — remove a row
    document.querySelectorAll('.rc-phone-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const idx = +btn.getAttribute('data-idx');
        // Snapshot live values before re-render so we don't lose typing in unaffected rows
        const current = Array.from(document.querySelectorAll('.rc-phone-input')).map(el => el.value);
        current.splice(idx, 1);
        state.formData.phones = current.length ? current : [''];
        render();
      });
    });
    // Phone — add a new row
    const phoneAddBtn = document.querySelector('.rc-phone-add');
    if (phoneAddBtn) {
      phoneAddBtn.addEventListener('click', e => {
        e.preventDefault();
        const current = Array.from(document.querySelectorAll('.rc-phone-input')).map(el => el.value);
        current.push('');
        state.formData.phones = current;
        render();
        setTimeout(() => {
          const inputs = document.querySelectorAll('.rc-phone-input');
          inputs[inputs.length - 1]?.focus();
        }, 0);
      });
    }
    // isNew checkbox
    const isNewBox = document.getElementById('rc-f-isNew');
    if (isNewBox) isNewBox.addEventListener('change', e => { state.formData.isNew = !!e.target.checked; });
    // Site dropdown
    const siteDD = document.getElementById('rc-f-siteId');
    if (siteDD) siteDD.addEventListener('change', e => { state.formData.siteId = e.target.value; });

    // Manual Request: type/restaurant/cuisine change handlers
    const reqTypeEl = document.getElementById('rc-req-type');
    if (reqTypeEl) reqTypeEl.addEventListener('change', handleReqTypeChange);
    const reqRestEl = document.getElementById('rc-req-restaurant');
    if (reqRestEl) reqRestEl.addEventListener('change', handleReqRestChange);
    const reqCuisineEl = document.getElementById('rc-req-cuisine');
    if (reqCuisineEl) reqCuisineEl.addEventListener('change', handleReqCuisineChange);

    // Cuisine dropdown (with Other handler)
    const cuisineSelect = document.getElementById('rc-f-cuisineType');
    if (cuisineSelect) {
      cuisineSelect.addEventListener('change', e => {
        const val = e.target.value;
        const existing = document.getElementById('rc-f-cuisineType-other');
        if (val === '__other__') {
          state.cuisineOtherActive = true;
          state.formData.cuisineType = '';
          if (!existing) {
            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'rc-f-cuisineType-other';
            input.className = 'rc-input';
            input.placeholder = 'Specify cuisine type (required)';
            input.value = '';
            input.style.marginTop = '6px';
            input.addEventListener('input', ev => { state.formData.cuisineType = ev.target.value; });
            cuisineSelect.parentNode.appendChild(input);
            setTimeout(() => input.focus(), 0);
          }
        } else {
          state.cuisineOtherActive = false;
          if (existing) existing.remove();
          state.formData.cuisineType = val;
        }
      });
      const existingOther = document.getElementById('rc-f-cuisineType-other');
      if (existingOther) existingOther.addEventListener('input', e => { state.formData.cuisineType = e.target.value; });
    }

    // Segmented toggles (status, performance)
    document.querySelectorAll('.rc-seg').forEach(seg => {
      const key = seg.getAttribute('data-seg');
      seg.querySelectorAll('.rc-seg-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          const val = btn.getAttribute('data-val');
          state.formData[key] = val;
          if (key === 'status' && val !== 'active' && !state.formData.statusDate) {
            state.formData.statusDate = todayISO();
          }
          render();
        });
      });
    });

    // Site form: shift schedule dropdowns (days per shift)
    document.querySelectorAll('.rc-day-select').forEach(sel => {
      sel.addEventListener('change', e => {
        const shiftKey = sel.getAttribute('data-shift');
        if (!state.modalState.shifts) state.modalState.shifts = emptyShifts();
        if (!state.modalState.shifts[shiftKey]) state.modalState.shifts[shiftKey] = { start: '', end: '', days: [] };
        if (!state.modalState.customMode) state.modalState.customMode = new Set();
        const val = sel.value;
        if (val === 'custom') {
          // Enter custom mode; keep current days as the starting point
          state.modalState.customMode.add(shiftKey);
        } else {
          // Pick a preset; leave custom mode
          state.modalState.customMode.delete(shiftKey);
          state.modalState.shifts[shiftKey].days = daysForPreset(val);
        }
        // Snapshot other live inputs so they don't get wiped on re-render
        SHIFT_TYPES.forEach(s => {
          const startEl = document.getElementById(`rc-sf-shift-${s.key}-start`);
          const endEl   = document.getElementById(`rc-sf-shift-${s.key}-end`);
          if (startEl) state.modalState.shifts[s.key].start = startEl.value;
          if (endEl)   state.modalState.shifts[s.key].end   = endEl.value;
        });
        ['name','snappeaLink','address','timeZone'].forEach(k => {
          const el = document.getElementById('rc-sf-' + k);
          if (el) state.modalState[k] = el.value;
        });
        render();
      });
    });
    // Site form: day-of-week toggle buttons (only visible when shift is in custom mode)
    document.querySelectorAll('.rc-day-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const shiftKey = btn.getAttribute('data-shift');
        const dayKey = btn.getAttribute('data-day');
        if (!state.modalState.shifts) state.modalState.shifts = emptyShifts();
        if (!state.modalState.shifts[shiftKey]) state.modalState.shifts[shiftKey] = { start: '', end: '', days: [] };
        const days = state.modalState.shifts[shiftKey].days || [];
        const idx = days.indexOf(dayKey);
        if (idx >= 0) days.splice(idx, 1);
        else days.push(dayKey);
        state.modalState.shifts[shiftKey].days = days;
        // Snapshot other live inputs
        SHIFT_TYPES.forEach(s => {
          const startEl = document.getElementById(`rc-sf-shift-${s.key}-start`);
          const endEl   = document.getElementById(`rc-sf-shift-${s.key}-end`);
          if (startEl) state.modalState.shifts[s.key].start = startEl.value;
          if (endEl)   state.modalState.shifts[s.key].end   = endEl.value;
        });
        ['name','snappeaLink','address','timeZone'].forEach(k => {
          const el = document.getElementById('rc-sf-' + k);
          if (el) state.modalState[k] = el.value;
        });
        render();
      });
    });
    // Site form: keep start/end values in modalState while typing (so day toggles don't wipe them)
    document.querySelectorAll('.rc-time-input').forEach(inp => {
      inp.addEventListener('input', e => {
        const m = inp.id.match(/^rc-sf-shift-(.+)-(start|end)$/);
        if (!m) return;
        const [, shiftKey, which] = m;
        if (!state.modalState.shifts) state.modalState.shifts = emptyShifts();
        if (!state.modalState.shifts[shiftKey]) state.modalState.shifts[shiftKey] = { start: '', end: '', days: [] };
        state.modalState.shifts[shiftKey][which] = inp.value;
      });
    });
    // Site form: keep simple text fields in modalState too
    ['rc-sf-name','rc-sf-snappeaLink','rc-sf-address','rc-sf-timeZone'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const key = id.replace('rc-sf-','');
      el.addEventListener('input', e => { state.modalState[key] = e.target.value; });
      el.addEventListener('change', e => { state.modalState[key] = e.target.value; });
    });

    // Modal backdrop click — dismisses non-form modals
    const modal = document.getElementById('rc-modal');
    if (modal) {
      modal.addEventListener('click', e => {
        const isFormModal = state.modal === 'form' || state.modal === 'siteForm';
        if (e.target.id === 'rc-modal' && !isFormModal) rcCloseModal();
      });
    }

    // Bulk add: file input + drag-drop on the dropzone
    const fileInput = document.getElementById('rc-bulk-file');
    if (fileInput) {
      fileInput.addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if (file) rcBulkFileSelected(file);
      });
    }
    const drop = document.getElementById('rc-bulk-drop');
    if (drop) {
      drop.addEventListener('dragover', e => {
        e.preventDefault();
        drop.classList.add('rc-drop-hover');
      });
      drop.addEventListener('dragleave', e => {
        drop.classList.remove('rc-drop-hover');
      });
      drop.addEventListener('drop', e => {
        e.preventDefault();
        drop.classList.remove('rc-drop-hover');
        const file = e.dataTransfer.files && e.dataTransfer.files[0];
        if (file) rcBulkFileSelected(file);
      });
    }

    // Bulk email modal — site checkbox toggle
    document.querySelectorAll('.rc-bulk-site-check').forEach(cb => {
      cb.addEventListener('change', e => {
        const siteId = cb.getAttribute('data-id');
        const siteIds = state.modalState.siteIds || new Set();
        const sel = state.modalState.selected || new Set();
        if (cb.checked) {
          siteIds.add(siteId);
          // Auto-select active contacts in the newly-added site, mirroring open-modal defaults
          state.contacts
            .filter(c => c.siteId === siteId && c.email && c.status === 'active')
            .forEach(c => sel.add(c.id));
        } else {
          siteIds.delete(siteId);
          // Drop any selected contacts that belong to the deselected site
          state.contacts
            .filter(c => c.siteId === siteId)
            .forEach(c => sel.delete(c.id));
        }
        state.modalState.siteIds = siteIds;
        state.modalState.selected = sel;
        state.modalState.subject = document.getElementById('rc-email-subject')?.value || state.modalState.subject || '';
        state.modalState.body    = document.getElementById('rc-email-body')?.value    || state.modalState.body    || '';
        render();
      });
    });

    // Bulk email modal — "All sites" button (check every eligible site, re-default to its active vendors)
    document.querySelectorAll('[data-action="bulk-sites-all"]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const eligibleSites = state.sites.filter(s =>
          !s.hidden && state.contacts.some(c => c.siteId === s.id && c.email)
        );
        const siteIds = new Set(eligibleSites.map(s => s.id));
        const sel = new Set(
          state.contacts
            .filter(c => siteIds.has(c.siteId) && c.email && c.status === 'active')
            .map(c => c.id)
        );
        state.modalState.siteIds = siteIds;
        state.modalState.selected = sel;
        state.modalState.subject = document.getElementById('rc-email-subject')?.value || state.modalState.subject || '';
        state.modalState.body    = document.getElementById('rc-email-body')?.value    || state.modalState.body    || '';
        render();
      });
    });

    // Bulk email modal — recipient toggles
    document.querySelectorAll('.rc-bulk-recipient').forEach(cb => {
      cb.addEventListener('change', e => {
        const id = cb.getAttribute('data-id');
        const sel = state.modalState.selected || new Set();
        if (cb.checked) sel.add(id); else sel.delete(id);
        state.modalState.selected = sel;
        state.modalState.subject = document.getElementById('rc-email-subject')?.value || state.modalState.subject || '';
        state.modalState.body    = document.getElementById('rc-email-body')?.value    || state.modalState.body    || '';
        render();
      });
    });
    // Bulk email modal — group toggle (entire status, across all selected sites)
    document.querySelectorAll('.rc-bulk-group-check').forEach(cb => {
      cb.addEventListener('change', e => {
        const status = cb.getAttribute('data-status');
        const siteIds = state.modalState.siteIds || new Set();
        const sel = state.modalState.selected || new Set();
        const contacts = state.contacts.filter(c => siteIds.has(c.siteId) && c.email && c.status === status);
        if (cb.checked) contacts.forEach(c => sel.add(c.id));
        else contacts.forEach(c => sel.delete(c.id));
        state.modalState.selected = sel;
        state.modalState.subject = document.getElementById('rc-email-subject')?.value || state.modalState.subject || '';
        state.modalState.body    = document.getElementById('rc-email-body')?.value    || state.modalState.body    || '';
        render();
      });
    });
    // Bulk email modal — select all / none across selected sites
    document.querySelectorAll('[data-action="bulk-email-all"], [data-action="bulk-email-none"]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const all = btn.getAttribute('data-action') === 'bulk-email-all';
        const siteIds = state.modalState.siteIds || new Set();
        const sel = new Set();
        if (all) {
          state.contacts
            .filter(c => siteIds.has(c.siteId) && c.email)
            .forEach(c => sel.add(c.id));
        }
        state.modalState.selected = sel;
        state.modalState.subject = document.getElementById('rc-email-subject')?.value || state.modalState.subject || '';
        state.modalState.body    = document.getElementById('rc-email-body')?.value    || state.modalState.body    || '';
        render();
      });
    });
    // Persist subject/body as user types so re-renders don't lose them
    ['rc-email-subject', 'rc-email-body'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const key = id === 'rc-email-subject' ? 'subject' : 'body';
      el.addEventListener('input', e => { state.modalState[key] = e.target.value; });
    });
  }

  // Escape key closes modals (form modal: route through cancelEdit to clear editing state)
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && state.modal) {
      if (state.modal === 'form') cancelEdit();
      else rcCloseModal();
    }
  });

  // Expose handlers used by inline onclick attributes
  window.rcOpenBulkAdd = rcOpenBulkAdd;
  window.rcOpenBulkEmail = rcOpenBulkEmail;
  window.rcShowHelp = rcShowHelp;

  /* ══════════════════ Boot ══════════════════ */
  (async function boot() {
    await loadAll();
    // Global handlers (registered once, not in bindEvents which runs every render)
    document.addEventListener('click', e => {
      if (state.siteDropdownOpen && !e.target.closest('.rc-site-dropdown')) {
        state.siteDropdownOpen = false;
        render();
      }
      if (state._searchFocused && !e.target.closest('.rc-global-search')) {
        state._searchFocused = false;
        render();
      }
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        let needsRender = false;
        if (state.siteDropdownOpen) { state.siteDropdownOpen = false; needsRender = true; }
        if (state._searchFocused)   { state._searchFocused = false;   needsRender = true; }
        if (needsRender) render();
      }
    });
    render();
  })();

  })(); // end IIFE
  </script>

</body>
</html>
